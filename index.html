<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>if(/github\.io$/.test(location.hostname)){location.replace("https://teoriaai.com/");}</script>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0B0E14">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TeoriaAI">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- منع تخزين نسخة قديمة من الصفحة -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>توريا فلسطين — المدرب محمد سواد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============ الهوية والتصميم ============ */
:root{
  --bg:#EEF1F4; --surface:#ffffff; --surface-2:#F5F7FA;
  --ink:#171B21; --muted:#67707D; --line:rgba(23,27,33,.10);
  --primary:#1D5FBF; --primary-d:#154A97; --primary-l:#E8F0FC;
  --accent:#FFC53D; --danger:#D6273B; --danger-l:#FBE9EC;
  --ok:#178A50; --ok-l:#E6F5ED;
  --shadow:0 14px 40px rgba(23,27,33,.14); --shadow-s:0 2px 12px rgba(23,27,33,.07);
  --r:18px; --r-s:13px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Alexandria',system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block}
::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-thumb{background:#d8d2da;border-radius:8px}

/* ============ الهيكل ============ */
.app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:160px}
.topbar{
  position:sticky;top:0;z-index:40;
  background:rgba(244,241,243,.82);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  color:var(--ink);
  padding:14px 18px 12px;display:flex;align-items:center;gap:11px;
}
.topbar .logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(150deg,#c23158,var(--primary) 45%,var(--primary-d));display:grid;place-items:center;flex:none;box-shadow:0 6px 18px rgba(29,95,191,.4)}
.topbar .logo svg{width:25px;height:25px}
.topbar h1{font-size:19px;font-weight:900;margin:0;line-height:1.1;letter-spacing:-.3px}
.topbar .sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.streak-chip{margin-inline-start:auto;display:none;align-items:center;gap:4px;background:linear-gradient(135deg,#ffe6c2,#ffd79e);color:#a05a00;font-weight:900;font-size:14px;padding:6px 13px;border-radius:30px;box-shadow:0 3px 10px rgba(224,140,0,.2)}
.streak-chip.show{display:flex}

.screen{padding:18px 18px 8px;animation:rise .4s cubic-bezier(.2,.7,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* ============ الرئيسية ============ */
.hero{background:linear-gradient(140deg,#b52a52 0%,var(--primary) 45%,#6a1330);border-radius:26px;padding:26px 22px;color:#fff;box-shadow:0 18px 44px rgba(29,95,191,.32);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;left:-50px;bottom:-60px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,255,255,.16),transparent 65%)}
.hero::before{content:"";position:absolute;right:-30px;top:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,197,61,.35),transparent 65%)}
.hero h2{margin:0 0 8px;font-size:25px;font-weight:900;position:relative;letter-spacing:-.5px;line-height:1.25}
.hero p{margin:0;opacity:.88;font-size:14.5px;font-weight:500;position:relative}
.hero .instructor{margin-top:16px;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);padding:9px 14px;border-radius:30px;position:relative;font-weight:700;font-size:14px}
.hero .instructor b{font-weight:900}

.stats{display:flex;gap:10px;margin:16px 0 6px}
.stat{flex:1;background:var(--surface);border-radius:18px;padding:14px 8px;text-align:center;box-shadow:var(--shadow-s)}
.stat .n{font-size:24px;font-weight:900;color:var(--primary);letter-spacing:-.5px}
.stat .l{font-size:12px;color:var(--muted);font-weight:600;margin-top:1px}

.menu{display:grid;gap:13px;margin-top:18px}
.card{background:var(--surface);border-radius:22px;padding:17px 18px;display:flex;align-items:center;gap:15px;box-shadow:var(--shadow-s);text-align:right;transition:transform .15s cubic-bezier(.2,.7,.2,1),box-shadow .15s}
.card:active{transform:scale(.975)}
.card:hover{box-shadow:0 10px 30px rgba(28,20,32,.1)}
.card .ic{width:54px;height:54px;border-radius:17px;display:grid;place-items:center;flex:none}
.card .ic svg{width:28px;height:28px}
.card .tx{flex:1}
.card .tx h3{margin:0;font-size:17.5px;font-weight:900;letter-spacing:-.3px}
.card .tx p{margin:3px 0 0;font-size:12.5px;color:var(--muted);font-weight:500;line-height:1.5}
.card .arrow{color:var(--line);font-size:26px;font-weight:300;color:#c9c2ce}
.ic.g{background:linear-gradient(135deg,#E8F0FC,#f6dbe4);color:var(--primary)}
.ic.a{background:linear-gradient(135deg,#fdf3dd,#f9e8bf);color:#b6820e}
.ic.b{background:linear-gradient(135deg,#e9f1fc,#d8e7f8);color:#2f6cc4}
.ic.p{background:linear-gradient(135deg,#f2ecfb,#e6d9f7);color:#6b3fa0}

/* ============ أزرار ============ */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;border-radius:17px;font-size:16px;font-weight:900;background:var(--primary);color:#fff;box-shadow:0 8px 22px rgba(29,95,191,.3);transition:transform .12s,box-shadow .12s;letter-spacing:-.2px}
.btn:active{transform:scale(.975)}
.btn.sec{background:var(--surface);color:var(--primary);box-shadow:var(--shadow-s)}
.btn.ghost{background:var(--surface-2);color:var(--ink);box-shadow:none}
.btn.sm{padding:11px 14px;font-size:14px;border-radius:13px}
.btn:disabled{opacity:.45;pointer-events:none}

/* ============ اختيار الامتحان ============ */
.sec-title{font-size:20px;font-weight:900;margin:6px 0 14px;display:flex;align-items:center;gap:9px;letter-spacing:-.4px}
.mode-cards{display:grid;gap:12px;margin-bottom:8px}
.exam-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-top:6px}
.exam-chip{aspect-ratio:1;background:var(--surface);border-radius:18px;display:grid;place-items:center;font-size:21px;font-weight:900;color:var(--primary);box-shadow:var(--shadow-s);transition:transform .12s}
.exam-chip:active{transform:scale(.92);background:var(--primary-l)}

/* ============ الامتحان ============ */
.quiz-head{display:flex;align-items:center;justify-content:space-between;gap:11px;margin-bottom:14px}
.progress-wrap{flex:1}
.progress-bar{height:9px;background:#22262D;border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#5B8FD9);border-radius:10px;transition:width .4s cubic-bezier(.2,.7,.2,1);width:0}
.q-count{font-size:13px;font-weight:700;color:var(--muted);margin-top:6px;text-align:center}
.timer{background:var(--ink);color:#fff;padding:9px 13px;border-radius:14px;font-weight:900;font-size:15px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:6px;flex:none}
.timer.warn{background:var(--danger);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.55}}

.q-card{background:var(--surface);border-radius:24px;padding:20px 18px;box-shadow:var(--shadow-s);position:relative;overflow:hidden}
.q-card .wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;transform:rotate(-24deg);opacity:.045;font-size:26px;font-weight:900;white-space:nowrap;color:var(--primary)}
.q-num{display:inline-block;background:var(--primary-l);color:var(--primary);font-weight:900;font-size:12.5px;padding:5px 13px;border-radius:30px;margin-bottom:12px}
.q-text{font-size:18.5px;font-weight:800;line-height:1.7;position:relative;z-index:1;letter-spacing:-.2px}
.q-text img,.opt img{display:inline-block;vertical-align:middle;height:48px;margin:2px 4px;border-radius:8px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.sig-chip{display:inline-block;background:var(--surface-2);border:1px dashed #c9b8bf;border-radius:9px;padding:1px 9px;font-weight:900;font-size:14px;margin:0 3px;color:var(--primary)}
.opts{display:grid;gap:11px;margin-top:18px;position:relative;z-index:1}
.opt{display:flex;align-items:center;gap:13px;background:var(--surface-2);border:2px solid transparent;border-radius:16px;padding:14px 15px;text-align:right;font-size:15.5px;font-weight:700;transition:all .14s;width:100%;color:var(--ink)}
.opt .lbl{width:32px;height:32px;border-radius:11px;background:#fff;display:grid;place-items:center;font-weight:900;flex:none;font-size:15px;box-shadow:0 2px 6px rgba(0,0,0,.06);color:var(--muted)}
.opt .otx{flex:1}
.opt .otx img{height:66px}
.opt.sel{border-color:var(--primary);background:var(--primary-l)}
.opt.sel .lbl{background:var(--primary);color:#fff}
.opt.correct{border-color:var(--ok);background:var(--ok-l)}
.opt.correct .lbl{background:var(--ok);color:#fff}
.opt.wrong{border-color:var(--danger);background:var(--danger-l)}
.opt.wrong .lbl{background:var(--danger);color:#fff}
.opt .mark{margin-inline-start:auto;font-weight:900;font-size:18px}

.quiz-nav{display:flex;gap:11px;margin-top:18px}
.quiz-nav .btn{flex:1}

/* ============ النتيجة ============ */
.result-card{background:var(--surface);border-radius:26px;padding:28px 22px;text-align:center;box-shadow:var(--shadow)}
.result-ring{width:150px;height:150px;margin:6px auto 16px;position:relative}
.result-ring svg{transform:rotate(-90deg)}
.result-ring .pct{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.result-ring .pct b{font-size:40px;font-weight:900;line-height:1;letter-spacing:-1px}
.result-ring .pct span{font-size:13px;color:var(--muted)}
.result-badge{display:inline-flex;align-items:center;gap:8px;font-size:21px;font-weight:900;padding:10px 22px;border-radius:30px;margin-bottom:8px}
.result-badge.pass{background:var(--ok-l);color:var(--ok)}
.result-badge.fail{background:var(--danger-l);color:var(--danger)}
.result-sub{color:var(--muted);font-size:15px;margin-bottom:20px;font-weight:600}
.result-sub b{color:var(--ink);font-weight:900}

/* ============ الإشارات ============ */
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:9px 16px;border-radius:30px;background:var(--surface);font-weight:800;font-size:14px;white-space:nowrap;box-shadow:var(--shadow-s);color:var(--muted)}
.tab.active{background:var(--primary);color:#fff;box-shadow:0 6px 16px rgba(29,95,191,.3)}
.search-box{display:flex;align-items:center;gap:9px;background:var(--surface);border-radius:16px;padding:13px 15px;margin-bottom:14px;box-shadow:var(--shadow-s)}
.search-box input{flex:1;border:none;outline:none;font-family:inherit;font-size:15px;background:none;color:var(--ink);font-weight:600}
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.sig{background:var(--surface);border-radius:20px;overflow:hidden;box-shadow:var(--shadow-s);transition:transform .12s}
.sig:active{transform:scale(.97)}
.sig .imgw{aspect-ratio:1.2;background:#fff;display:grid;place-items:center;padding:12px;position:relative}
.sig .imgw img{max-width:100%;max-height:100%;object-fit:contain}
.sig .noimg{color:var(--muted);font-weight:900;font-size:22px}
.sig .code{position:absolute;top:8px;inset-inline-start:8px;background:var(--primary);color:#fff;font-size:11px;font-weight:900;padding:3px 9px;border-radius:20px}
.sig .txt{padding:11px 13px;font-size:12.5px;font-weight:700;line-height:1.5;background:var(--surface)}

/* ============ الشات بوت ============ */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:420px}
.chat-msgs{flex:1;overflow-y:auto;padding:4px 2px 10px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:88%;padding:12px 15px;border-radius:20px;font-size:15px;line-height:1.65;box-shadow:var(--shadow-s);animation:fade .25s}
.msg.bot{background:var(--surface);border-top-right-radius:6px;align-self:flex-start}
.msg.me{background:var(--primary);color:#fff;border-top-left-radius:6px;align-self:flex-end;box-shadow:0 6px 16px rgba(29,95,191,.28)}
.msg .res-sig{display:flex;gap:11px;align-items:center;background:var(--surface-2);border-radius:14px;padding:9px;margin-top:9px}
.msg .res-sig img{width:58px;height:58px;object-fit:contain;background:#fff;border-radius:11px;flex:none;padding:4px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.msg .res-sig .rc{font-size:12.5px}
.msg .res-sig .rc b{color:var(--primary)}
.msg .res-q{background:var(--surface-2);border-radius:14px;padding:11px;margin-top:9px;font-size:13.5px}
.msg .res-q .qq{font-weight:800}
.msg .res-q .aa{color:var(--ok);font-weight:800;margin-top:5px;display:flex;gap:5px;align-items:center}
.msg .res-q img{height:40px;display:inline-block;vertical-align:middle;margin:0 3px;border-radius:6px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:11px}
.chip{background:var(--surface);border-radius:30px;padding:9px 14px;font-size:13px;font-weight:800;color:var(--primary);box-shadow:var(--shadow-s)}
.chat-input{display:flex;gap:9px;align-items:center;background:var(--surface);border-radius:20px;padding:7px 7px 7px 16px;box-shadow:var(--shadow-s)}
.chat-input input{flex:1;border:none;outline:none;font-family:inherit;font-size:15px;background:none;font-weight:600}
.chat-input .send{width:44px;height:44px;border-radius:14px;background:var(--primary);color:#fff;display:grid;place-items:center;flex:none;box-shadow:0 5px 14px rgba(29,95,191,.3)}
.chat-input .send svg{width:20px;height:20px}

/* ============ الأزرار العائمة ============ */
.fab{position:fixed;bottom:100px;inset-inline-start:16px;z-index:44;display:flex;flex-direction:column;gap:11px}
.fab a{width:50px;height:50px;border-radius:50%;display:grid;place-items:center;box-shadow:0 8px 22px rgba(0,0,0,.22);text-decoration:none;transition:transform .14s}
.fab a:active{transform:scale(.88)}
.fab .wa{background:#25d366}
.fab .sn{background:#fffc00;position:relative}
.fab a svg{width:28px;height:28px}
.fab .sn small{position:absolute;bottom:-15px;inset-inline-start:50%;transform:translateX(50%);font-size:9px;font-weight:900;color:#8a7a00;white-space:nowrap;background:#fffc00;padding:1px 6px;border-radius:8px}

/* ============ شاشة عامة ============ */
.center-screen{min-height:100vh;display:grid;place-content:center;text-align:center;padding:32px;gap:13px}
.spinner{width:46px;height:46px;border:4px solid var(--line);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.brand-footer{text-align:center;font-size:12.5px;color:var(--muted);padding:22px 16px 8px;font-weight:600;line-height:1.7}
.brand-footer b{color:var(--primary);font-weight:900}
.hidden{display:none!important}

/* ============ الأقسام الرئيسية ============ */
.card.big-sec{padding:19px 17px}
.card.big-sec .ic{width:54px;height:54px}
.card.big-sec h3{font-size:16.5px}
.hub-guide{background:#fffbeb;border-radius:16px;padding:12px 15px;margin-top:14px;font-size:13.5px;line-height:1.7;color:#7a5c00;font-weight:700}

/* ============ تقرير النتيجة والمشاركة ============ */
.weak-box{background:var(--surface-2);border-radius:18px;padding:15px;margin:14px 0;text-align:right}
.weak-box .wk-t{font-weight:900;font-size:15px;margin-bottom:10px}
.weak-box .wk-row{display:flex;justify-content:space-between;padding:7px 4px;font-size:13.5px;font-weight:700;border-bottom:1px dashed var(--line)}
.weak-box .wk-row:last-of-type{border-bottom:none}
.weak-box .wk-row b{color:var(--danger)}
.weak-box .wk-tip{margin-top:10px;font-size:12.5px;color:#7a5c00;background:#fffbeb;border-radius:12px;padding:9px 12px;font-weight:700;line-height:1.7}
.share-app{width:100%;border:none;margin-top:16px;background:linear-gradient(135deg,#1f8a55,#136b40);color:#fff;font-family:inherit;font-weight:900;font-size:14.5px;padding:15px;border-radius:18px;cursor:pointer;box-shadow:var(--shadow-s)}
.share-app:active{transform:scale(.98)}
.exam-chip-cta,.exam-chip-on{width:100%;border:none;margin-top:14px;font-family:inherit;font-weight:800;font-size:13.5px;padding:13px 15px;border-radius:16px;cursor:pointer;line-height:1.6}
.exam-chip-cta{background:var(--surface);color:var(--muted);box-shadow:var(--shadow-s)}
.exam-chip-on{background:linear-gradient(135deg,#fff3e0,#ffe6c2);color:#8a5a00}
.exam-chip-on b{font-size:17px}
.ov{position:fixed;inset:0;background:rgba(20,10,16,.55);backdrop-filter:blur(4px);z-index:200;display:grid;place-items:center;padding:20px}
.ov-card{background:var(--surface);border-radius:24px;padding:22px 20px;max-width:420px;width:100%;box-shadow:var(--shadow)}
.ov-card h3{font-size:18px;font-weight:900;margin-bottom:8px}
.ov-card p{font-size:13.5px;color:var(--muted);font-weight:600;line-height:1.8;margin-bottom:14px}
.ov-card input[type=date]{width:100%;padding:13px;border:2px solid var(--line);border-radius:14px;font-family:inherit;font-size:15px;font-weight:700;margin-bottom:12px;background:var(--surface-2)}
.ov-card .btn{margin-bottom:9px}

/* ============ الأرقام المهمة + الجاهزية ============ */
.num-grp{background:var(--surface);border-radius:20px;padding:16px;margin-top:14px;box-shadow:var(--shadow-s)}
.num-grp .ng-t{font-weight:900;font-size:15px;margin-bottom:10px}
.num-grp .ng-row{display:flex;align-items:center;gap:13px;padding:9px 2px;border-bottom:1px dashed var(--line)}
.num-grp .ng-row:last-child{border-bottom:none}
.num-grp .ng-v{flex:none;min-width:74px;text-align:center;background:#fdf3e8;color:#8a5a00;font-weight:900;font-size:14.5px;border-radius:12px;padding:8px 10px}
.num-grp .ng-d{font-size:13.5px;font-weight:700;line-height:1.6}
.ready-card{background:var(--surface);border-radius:22px;padding:22px 18px;margin-top:16px;text-align:center;box-shadow:var(--shadow-s)}
.ready-card .rd-verdict{font-size:19px;font-weight:900;margin-top:12px}
.ready-card .rd-msg{font-size:13.5px;font-weight:700;color:var(--muted);line-height:1.8;margin-top:8px}

/* ============ أزرار الصوت ============ */
.tts-btn{width:34px;height:34px;border:none;border-radius:10px;background:var(--surface-2);font-size:15px;cursor:pointer;display:inline-grid;place-items:center;transition:.2s;vertical-align:middle;margin-inline-start:8px}
.tts-btn:active{transform:scale(.92)}
.tts-btn.playing{background:#e9f7f0;animation:ttsPulse 1s infinite}
@keyframes ttsPulse{0%,100%{box-shadow:0 0 0 0 rgba(31,138,85,.35)}50%{box-shadow:0 0 0 8px rgba(31,138,85,0)}}
.tts-tgl{border:none;background:rgba(255,255,255,.18);color:#fff;width:38px;height:38px;border-radius:12px;font-size:16px;cursor:pointer;flex:none}
.msg-tts{border:none;background:transparent;font-size:14px;cursor:pointer;margin-inline-start:6px;opacity:.65;vertical-align:middle}
.msg-tts:active{transform:scale(.9)}

/* ============ إشارات للمبتدئين ============ */
.beg-intro-card{background:var(--surface);border-radius:20px;padding:17px;margin-top:14px;font-size:14px;line-height:1.8;box-shadow:var(--shadow-s);font-weight:600}
.beg-intro-card b{color:#1f8a55;font-weight:900}
.beg-book{background:#eef8f2;border-radius:16px;padding:13px 15px;margin-top:10px;font-size:13px;line-height:1.8;color:#1c4a33;font-weight:600}
.beg-sig-card{background:var(--surface);border-radius:24px;padding:24px 20px;text-align:center;box-shadow:var(--shadow);margin-top:4px}
.beg-sig-card .bsc-tag{display:inline-block;background:#e9f7f0;color:#1f8a55;font-weight:900;font-size:12px;padding:5px 14px;border-radius:30px;margin-bottom:14px}
.beg-sig-card .bsc-img{width:150px;height:150px;margin:0 auto;background:#fff;border-radius:20px;display:grid;place-items:center;padding:12px;box-shadow:0 8px 24px rgba(28,20,32,.1)}
.beg-sig-card .bsc-img img{max-width:100%;max-height:100%;object-fit:contain}
.beg-sig-card .bsc-code{font-size:15px;font-weight:900;color:#1f8a55;margin-top:14px}
.beg-sig-card .bsc-txt{font-size:17px;font-weight:800;line-height:1.7;margin-top:6px}
.beg-sig-card .bsc-note{font-size:12.5px;color:var(--muted);font-weight:700;margin-top:12px;background:var(--surface-2);border-radius:12px;padding:8px}
.beg-pin{display:flex;align-items:center;gap:11px;background:#e9f7f0;border-radius:16px;padding:10px 13px}
.beg-pin .bp-img{width:52px;height:52px;background:#fff;border-radius:12px;display:grid;place-items:center;flex:none;font-size:24px;padding:4px;box-shadow:0 3px 8px rgba(0,0,0,.07)}
.beg-pin .bp-img img{max-width:100%;max-height:100%;object-fit:contain}
.beg-pin .bp-tx{font-size:12.5px;font-weight:700;line-height:1.5}
.beg-pin .bp-tx b{color:#1f8a55}
.beg-pin .bp-n{font-size:11px;color:var(--muted);margin-top:2px}

/* ============ التحفيز ============ */
.motivate{font-size:16px;font-weight:900;color:var(--primary);margin:6px 0 10px}
.level-bar{background:var(--surface-2);border-radius:14px;padding:12px 14px;margin:6px 0 14px;text-align:right}
.level-bar .lv-top{display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin-bottom:8px}
.level-bar .lv-track{height:10px;background:#22262D;border-radius:10px;overflow:hidden}
.level-bar .lv-fill{height:100%;border-radius:10px;transition:width .8s cubic-bezier(.2,.7,.2,1)}
.level-bar .lv-pts{font-size:11.5px;color:var(--muted);font-weight:700;margin-top:6px;text-align:center}
.new-badges{background:linear-gradient(135deg,#fdf6e3,#f9ecc8);border-radius:16px;padding:14px;margin-bottom:14px}
.new-badges .nb-t{font-weight:900;color:#a97e12;font-size:14px;margin-bottom:10px}
.new-badges .nb-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.new-badges .nb{text-align:center;animation:pop .5s cubic-bezier(.2,.9,.3,1.3)}
.new-badges .nb-ic{font-size:32px}
.new-badges .nb-nm{font-size:11px;font-weight:800;margin-top:2px}

/* شبكة الأوسمة بصفحة التقدّم */
.badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.bdg{background:var(--surface);border-radius:16px;padding:13px 8px;text-align:center;box-shadow:var(--shadow-s)}
.bdg.locked{opacity:.4;filter:grayscale(1)}
.bdg .bic{font-size:30px}
.bdg .bnm{font-size:11px;font-weight:800;margin-top:4px}
.bdg .bds{font-size:9.5px;color:var(--muted);font-weight:600;margin-top:2px;line-height:1.4}

/* كونفيتي */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
.confetti i{position:absolute;top:-20px;width:10px;height:14px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(104vh) rotate(720deg);opacity:.9}}

/* الشهادة */
.cert{background:linear-gradient(135deg,#fbf3e0,#f7ead0);border-radius:22px;padding:8px;box-shadow:var(--shadow)}
.cert-in{border:2px solid #c98a00;border-radius:18px;padding:24px 18px;text-align:center;background:
  radial-gradient(circle at 50% 0%,rgba(201,138,0,.06),transparent 60%)}
.cert-top{font-size:24px;font-weight:900;color:#154A97}
.cert-app{font-size:12.5px;font-weight:800;color:#a97e12;margin-top:3px}
.cert-line{height:2px;width:60px;background:#c98a00;margin:14px auto;border-radius:2px}
.cert-lbl{font-size:12.5px;color:#6b5a3a;font-weight:700}
.cert-name{font-size:26px;font-weight:900;color:#1c1420;margin:6px 0 10px}
.cert-score{font-size:22px;font-weight:900;color:#2fa46a;margin:4px 0 16px}
.cert-foot{display:flex;justify-content:space-between;font-size:12px;font-weight:800;color:#5a4a2a;border-top:1px dashed #d9c08a;padding-top:12px}
.cert-wa{font-size:11px;font-weight:800;color:#154A97;margin-top:12px;background:rgba(142,30,60,.07);padding:7px;border-radius:10px}

/* ============ شريط التنقّل السفلي العائم ============ */
.botnav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:460px;z-index:45;background:rgba(255,255,255,.9);backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);border-radius:26px;display:flex;padding:8px;box-shadow:0 12px 34px rgba(28,20,32,.16)}
.botnav .bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px;border-radius:18px;color:var(--muted);font-size:11px;font-weight:800;transition:all .18s}
.botnav .bn svg{width:23px;height:23px}
.botnav .bn.on{background:var(--primary-l);color:var(--primary)}

/* ============ لوحة التقدّم ============ */
.ready-card{background:linear-gradient(140deg,#b52a52,var(--primary) 50%,#6a1330);border-radius:26px;padding:22px;color:#fff;box-shadow:0 16px 40px rgba(29,95,191,.3);text-align:center;position:relative;overflow:hidden;margin-bottom:16px}
.ready-card .rr{width:130px;height:130px;margin:8px auto 10px;position:relative}
.ready-card .rr .pct{position:absolute;inset:0;display:grid;place-content:center}
.ready-card .rr .pct b{font-size:36px;font-weight:900;line-height:1;letter-spacing:-1px}
.ready-card .rmsg{font-size:16px;font-weight:900}
.prog-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:16px}
.pstat{background:var(--surface);border-radius:18px;padding:15px 8px;text-align:center;box-shadow:var(--shadow-s)}
.pstat .n{font-size:23px;font-weight:900;color:var(--primary);letter-spacing:-.5px}
.pstat .l{font-size:11.5px;color:var(--muted);font-weight:700;margin-top:3px}
.topic-row{background:var(--surface);border-radius:18px;padding:14px 16px;margin-bottom:11px;box-shadow:var(--shadow-s)}
.topic-row .th{display:flex;align-items:center;gap:9px;font-weight:900;font-size:14.5px;margin-bottom:10px}
.topic-row .th .pc{margin-inline-start:auto;font-weight:900;font-size:15px}
.topic-row .tbar{height:10px;background:#22262D;border-radius:10px;overflow:hidden}
.topic-row .tfill{height:100%;border-radius:10px;transition:width .6s cubic-bezier(.2,.7,.2,1)}
.act-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:4px 0 18px}
.act-card{background:var(--surface);border-radius:20px;padding:17px;text-align:center;box-shadow:var(--shadow-s);position:relative;transition:transform .12s}
.act-card:active{transform:scale(.96)}
.act-card .ac-ic{font-size:28px}
.act-card .ac-t{font-weight:900;font-size:15.5px;margin-top:5px}
.act-card .ac-n{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.act-card .ac-badge{position:absolute;top:11px;inset-inline-start:11px;background:var(--danger);color:#fff;font-size:11px;font-weight:900;min-width:22px;height:22px;border-radius:22px;display:grid;place-items:center;padding:0 6px;box-shadow:0 3px 8px rgba(224,69,63,.35)}

/* ============ العلم + شرح + اسأل المدرب ============ */
.flag-btn{position:absolute;top:16px;inset-inline-end:16px;z-index:3;display:flex;align-items:center;gap:6px;height:36px;padding:0 12px;border-radius:12px;background:var(--surface-2);color:var(--muted);font-size:12.5px;font-weight:800}
.flag-btn.on{background:#fff2db;color:#c98600}
.flag-btn svg{width:17px;height:17px}
.explain{background:var(--ok-l);border-radius:14px;padding:12px 14px;margin-top:13px;font-size:13.5px;line-height:1.7;font-weight:600}
.explain b{color:var(--ok);font-weight:900}
.ask-teacher{display:inline-flex;align-items:center;gap:7px;background:#25d366;color:#fff;font-weight:900;font-size:13px;padding:9px 15px;border-radius:13px;text-decoration:none;margin-top:11px;box-shadow:0 5px 14px rgba(37,211,102,.3)}
.ask-teacher svg{width:16px;height:16px}

/* ============ التمرين السريع ============ */
.daily-hero{background:linear-gradient(140deg,#ffa04d,#e0601a);border-radius:26px;padding:26px 22px;color:#fff;text-align:center;box-shadow:0 16px 40px rgba(224,96,26,.32);margin-bottom:16px;position:relative;overflow:hidden}
.daily-hero .fire{font-size:46px}
.daily-hero h2{margin:8px 0 5px;font-size:25px;font-weight:900;letter-spacing:-.5px}
.daily-hero p{margin:0;opacity:.92;font-size:14.5px;font-weight:600}
.daily-done{background:var(--ok-l);border-radius:20px;padding:20px;text-align:center;color:var(--ok);font-weight:900;margin-bottom:16px}

/* ============ صفحة الدخول ============ */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px 26px;position:relative;overflow:hidden}
.landing::before{content:"";position:absolute;top:-140px;inset-inline-start:-90px;width:320px;height:320px;background:radial-gradient(circle,rgba(29,95,191,.18),transparent 68%)}
.landing::after{content:"";position:absolute;bottom:-160px;inset-inline-end:-100px;width:340px;height:340px;background:radial-gradient(circle,rgba(255,197,61,.16),transparent 68%)}
.landing-inner{position:relative;z-index:1;max-width:400px;width:100%;animation:rise .5s cubic-bezier(.2,.7,.2,1)}
.landing .badge{display:inline-flex;align-items:center;gap:7px;background:var(--surface);color:var(--primary);font-weight:900;font-size:12.5px;padding:8px 16px;border-radius:30px;margin-bottom:28px;box-shadow:var(--shadow-s)}
.landing .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(47,164,106,.6);animation:blip 1.7s infinite}
@keyframes blip{0%{box-shadow:0 0 0 0 rgba(47,164,106,.5)}70%{box-shadow:0 0 0 10px rgba(47,164,106,0)}100%{box-shadow:0 0 0 0 rgba(47,164,106,0)}}
.landing .l-logo{width:96px;height:96px;margin:0 auto 24px;border-radius:30px;background:linear-gradient(150deg,#c23158,var(--primary) 45%,var(--primary-d));display:grid;place-items:center;box-shadow:0 20px 50px rgba(29,95,191,.42)}
.landing .l-logo svg{width:54px;height:54px}
.landing h1{font-size:32px;font-weight:900;margin:0 0 8px;line-height:1.22;letter-spacing:-.8px}
.landing h1 .ai{background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.landing .tagline{color:var(--muted);font-size:16px;font-weight:600;margin:0 0 24px;line-height:1.6}
.landing .demo-pill{background:var(--surface);border-radius:18px;padding:15px 17px;font-size:13.5px;color:var(--muted);font-weight:600;margin-bottom:24px;line-height:1.7;box-shadow:var(--shadow-s)}
.landing .demo-pill b{color:var(--primary);font-weight:900}
.landing .enter-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:18px;border-radius:18px;font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;box-shadow:0 12px 32px rgba(29,95,191,.38);transition:transform .12s;letter-spacing:-.2px}
.landing .enter-btn:active{transform:scale(.97)}
.landing .wa-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:16px;border-radius:18px;font-size:16px;font-weight:900;background:#25d366;color:#fff;text-decoration:none;margin-top:13px;box-shadow:0 10px 26px rgba(37,211,102,.3)}
.landing .l-foot{margin-top:28px;color:var(--muted);font-size:13px;font-weight:700}
.landing .l-foot b{color:var(--ink)}
.landing .feats{display:flex;gap:9px;justify-content:center;margin-top:22px;flex-wrap:wrap}
.landing .feat{background:var(--surface);border-radius:14px;padding:9px 13px;font-size:12px;font-weight:800;color:var(--muted);box-shadow:var(--shadow-s)}

/* ============ شريط النسخة التجريبية ============ */
.demo-bar{background:var(--surface);color:var(--primary);display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:12.5px;font-weight:700;justify-content:center;flex-wrap:wrap;line-height:1.4;text-align:center;box-shadow:0 2px 10px rgba(28,20,32,.04)}
.demo-bar .tag{background:var(--primary);color:#fff;font-weight:900;padding:3px 10px;border-radius:30px;font-size:11px;flex:none}
.demo-bar span{color:var(--muted)}
.demo-bar a{background:#25d366;color:#fff;text-decoration:none;padding:5px 13px;border-radius:30px;font-weight:900;font-size:12px;display:inline-flex;align-items:center;gap:5px;flex:none}
.demo-note{background:var(--primary-l);border-radius:18px;padding:14px 15px;margin-top:16px;font-size:13.5px;color:var(--ink);text-align:center;font-weight:600;line-height:1.7}
.demo-note b{font-weight:900;color:var(--primary)}
.demo-note a{color:#128c7e;font-weight:900;text-decoration:none}

/* ============ نافذة كلمة السر ============ */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(28,20,32,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:26px;animation:fade .22s}
.modal{background:var(--surface);border-radius:28px;padding:28px 24px;max-width:360px;width:100%;text-align:center;box-shadow:0 30px 70px rgba(28,20,32,.4);animation:pop .28s cubic-bezier(.2,.9,.3,1.2)}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:none;opacity:1}}
.modal .lock{width:66px;height:66px;margin:0 auto 16px;border-radius:20px;background:var(--primary-l);display:grid;place-items:center;color:var(--primary)}
.modal .lock svg{width:34px;height:34px}
.modal h3{margin:0 0 6px;font-size:21px;font-weight:900;letter-spacing:-.4px}
.modal p{margin:0 0 18px;color:var(--muted);font-size:14px;font-weight:600}
.modal .pin{width:100%;text-align:center;font-size:28px;font-weight:900;letter-spacing:10px;padding:14px;border:2px solid var(--line);border-radius:16px;outline:none;font-family:inherit;background:var(--surface-2);color:var(--ink);margin-bottom:8px}
.modal .pin:focus{border-color:var(--primary)}
.modal .err{color:var(--danger);font-size:13px;font-weight:800;min-height:18px;margin-bottom:8px}
.modal .m-wa{display:block;margin-top:14px;color:var(--muted);font-size:12.5px;text-decoration:none;font-weight:600}
.modal .m-wa b{color:#128c7e}

/* ===== محاذاة إنجليزي (LTR) ===== */
[dir="ltr"] .card,[dir="ltr"] .opt,[dir="ltr"] .weak-box,[dir="ltr"] .level-bar{text-align:left}

/* ============================================================
   DESIGN 2.0 — هوية "لغة الشاخصة" (Road-Sign Language)
   أزرق إرشاد للأفعال · أحمر إشارة للخطر · أصفر تحذير للتقدم
   التوقيع: خط المسلك المتقطع (d1) بأشرطة التقدم
   ============================================================ */
body{background:var(--bg)}
.topbar{background:rgba(255,255,255,.88);border-bottom:1px solid var(--line)}
.btn{border-radius:14px;box-shadow:0 6px 16px rgba(29,95,191,.25);border-bottom:3px solid var(--primary-d)}
.btn:active{transform:translateY(1px);border-bottom-width:2px}
.btn.ghost{border-bottom:3px solid var(--line);box-shadow:none}
.enter-btn{background:var(--primary);border-radius:14px;border-bottom:4px solid var(--primary-d);box-shadow:0 10px 26px rgba(29,95,191,.3)}
.card{border:1px solid var(--line);border-radius:var(--r)}
.opt{border-radius:var(--r-s);border:1.5px solid var(--line);background:var(--surface)}
.opt .lbl{border-radius:9px;border:2px solid var(--line);box-shadow:none;color:var(--ink)}
.opt.sel .lbl{border-color:var(--primary);background:var(--primary);color:#fff}
.opt.correct .lbl{border-color:var(--ok);background:var(--ok);color:#fff}
.opt.wrong .lbl{border-color:var(--danger);background:var(--danger);color:#fff}
.q-num{background:var(--ink);color:var(--accent);border-radius:9px;letter-spacing:.3px}
.timer{color:var(--accent);border-radius:12px}
.sig-chip{background:#fff;border:2px solid var(--ink);color:var(--ink);border-radius:8px;border-style:solid}
.explain{background:var(--primary-l);border-inline-start:4px solid var(--primary);border-radius:10px}
.sec-title{border-inline-start:4px solid var(--primary);padding-inline-start:10px}
/* ---- التوقيع: خط المسلك المتقطع ---- */
.lv-track,.tbar,.progress-bar{height:12px;background:#22262D;border-radius:8px;position:relative;overflow:hidden}
.lv-track::after,.tbar::after,.progress-bar::after{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,transparent 0 12px,rgba(255,255,255,.5) 12px 22px,transparent 22px 34px);background-size:34px 2px;background-repeat:repeat-x;background-position:center;pointer-events:none}
.progress-fill{background:var(--accent);border-radius:8px}
.botnav{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-s)}
.exam-chip{border:1px solid var(--line);border-radius:14px}
.chip{border:1px solid var(--line);box-shadow:none}
.fab{filter:drop-shadow(0 6px 14px rgba(23,27,33,.18))}

/* الشهادة تبقى فاتحة دايماً */
.cert,.cert-in{color:#0E1420}


/* ===== خطة ٣ أيام — خارطة طريق ===== */
.plan-hero{background:linear-gradient(135deg,#154A97,#1D5FBF);color:#fff;border-radius:var(--r);padding:22px 20px;margin-bottom:6px}
.plan-hero h2{font-size:22px;font-weight:900;margin-bottom:6px}
.plan-hero p{font-size:13.5px;opacity:.92}
.plan-prog{margin-top:14px}
.plan-prog .pp{height:12px;background:#22262D;border-radius:8px;position:relative;overflow:hidden}
.plan-prog .pp::after{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,transparent 0 12px,rgba(255,255,255,.5) 12px 22px,transparent 22px 34px);background-size:34px 2px;background-repeat:repeat-x;background-position:center}
.plan-prog .pf{height:100%;background:var(--accent);border-radius:8px;transition:width .4s}
.plan-prog .pt{font-size:12.5px;margin-top:6px;font-weight:700;opacity:.95}
.plan-road{position:relative;padding-inline-start:34px;margin-top:14px}
.plan-road::before{content:"";position:absolute;inset-inline-start:11px;top:8px;bottom:8px;width:8px;background:#22262D;border-radius:6px}
.plan-road::after{content:"";position:absolute;inset-inline-start:14px;top:8px;bottom:8px;width:2px;background-image:repeating-linear-gradient(180deg,rgba(255,255,255,.55) 0 9px,transparent 9px 18px)}
.plan-day{position:relative;margin-bottom:18px}
.plan-day .pd-dot{position:absolute;inset-inline-start:-34px;top:2px;width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:900;font-size:14px;border:3px solid var(--bg);z-index:2}
.plan-day.done .pd-dot{background:var(--ok)}
.plan-day h3{font-size:17px;font-weight:900;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.plan-day h3 .pd-badge{font-size:11.5px;font-weight:800;background:var(--ok-l);color:var(--ok);padding:3px 10px;border-radius:20px}
.ptask{display:flex;align-items:center;gap:12px;width:100%;text-align:start;background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-s);padding:13px 14px;margin-bottom:8px;font-family:inherit;cursor:pointer}
.ptask .pchk{width:26px;height:26px;border-radius:9px;border:2.5px solid var(--line);flex:none;display:grid;place-items:center;font-size:15px;color:#fff}
.ptask.done{border-color:var(--ok);background:var(--ok-l)}
.ptask.done .pchk{background:var(--ok);border-color:var(--ok)}
.ptask .pt-tx{flex:1;font-size:14.5px;font-weight:700;color:var(--ink)}
.ptask .pt-go{color:var(--muted);font-size:18px}

/* ===== شاشة "عندك 3 خيارات" ===== */
.path-wrap{display:flex;flex-direction:column;gap:14px;margin-top:10px}
.path-card{display:flex;align-items:center;gap:16px;width:100%;text-align:start;font-family:inherit;cursor:pointer;
  background:var(--surface);border:2px solid var(--line);border-radius:var(--r);padding:20px 18px;transition:.15s}
.path-card:active{transform:scale(.985)}
.path-card .pc-num{width:44px;height:44px;border-radius:14px;flex:none;display:grid;place-items:center;
  font-weight:900;font-size:20px;background:var(--ink);color:var(--accent)}
.path-card .pc-ic{font-size:34px;flex:none}

function normAr(s){return (s||"").replace(/[\u064B-\u065F\u0670]/g,"").replace(/[إأآا]/g,"ا").replace(/ى/g,"ي").replace(/ة/g,"ه").replace(/[ؤئ]/g,"و").replace(/[^\u0600-\u06FF0-9a-zA-Z ]/g," ").replace(/ا{2,}/g,"ا").replace(/\s+/g," ").trim().toLowerCase();}
function fixBook(t){return (t||"").replace(/اإ/g,"الإ").replace(/اأ/g,"الأ").replace(/اإل/g,"الإل").replace(/\s+/g," ").trim();}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// يحوّل [[code]] داخل النص إلى صورة الإشارة (أو رمز نصّي إذا ما في صورة)
function renderSig(text, big){
  const h = big?64:46;
  return esc(text).replace(/\[\[(\w+)\]\]/g,(m,code)=>{
    const s = DATA.signals[code];
    if(!s) return `<span class="sig-chip">${code}</span>`;
    if(s.no_image) return `<span class="sig-chip" title="${esc(tsig(code))}">${esc(tcode(code))}</span>`;
    return `<img src="${IMG_BASE}${code}.jpg" alt="${esc(tcode(code))}" title="${esc(tsig(code))}" style="height:${h}px" loading="lazy" onerror="this.outerHTML='<span class=\\'sig-chip\\'>${esc(tcode(code))}</span>'">`;
  });
}
// هل الخيار عبارة عن صورة إشارة فقط؟
function isImgOnly(t){return normAr(t.replace(/\[\[\w+\]\]/g,"")).length===0 && /\[\[\w+\]\]/.test(t);}

// فاحص التحديث — يجيب الصفحة من السيرفر (متجاوزاً الكاش) ويقارن الإصدار
async function checkForUpdate(){
  try{
    const u = location.origin + location.pathname + "?u=" + Date.now();
    const r = await fetch(u, {cache:"no-store"});
    if(!r.ok) return;
    const t = await r.text();
    const m = t.match(/VERSION:\s*"([\d.]+)"/);
    if(m && m[1] !== CFG.VERSION){
      // نسخة أجدد موجودة — أعد التحميل مرة وحدة بس (حماية من التكرار)
      if(sessionStorage.getItem("upd_done")!==m[1]){
        sessionStorage.setItem("upd_done", m[1]);
        location.reload();
      }
    }
  }catch(e){/* بدون نت أو فشل — تجاهل */}
}

async function boot(){
  // 0) فحص التحديث: لو في نسخة أجدد على السيرفر، حدّث الصفحة تلقائياً (مرة وحدة)
  checkForUpdate();

  // 1) مفتاح الإيقاف
  try{
    const r = await fetch(CONFIG_URL+"?t="+Date.now(),{cache:"no-store"});
    if(r.ok){const c=await r.json(); if(c && c.open===false){return renderClosed(c.message);}}
  }catch(e){/* الملف غير موجود = مفتوح */}

  // 2) تحميل الداتا
  try{
    const r = await fetch(DATA_URL);
    DATA = await r.json();
    // تحميل ملف الشروحات (اختياري) — لو موجود على الريبو
    try{
      const er = await fetch(`https://raw.githubusercontent.com/${CFG.REPO}/main/explanations.json?t=`+Date.now(),{cache:"no-store"});
      if(er.ok){ DATA.explanations = await er.json(); }
    }catch(e){ /* ما في ملف شروحات = عادي */ }
    try{
      const er2 = await fetch(`https://raw.githubusercontent.com/${CFG.REPO}/main/explanations_en.json?t=`+Date.now(),{cache:"no-store"});
      if(er2.ok){ DATA.explanations_en = await er2.json(); }
    }catch(e){ /* الشروحات الإنجليزية اختيارية */ }
    try{
      const er3 = await fetch(`https://raw.githubusercontent.com/${CFG.REPO}/main/wrong_expl.json?t=`+Date.now(),{cache:"no-store"});
      if(er3.ok){ DATA.wrongExpl = await er3.json(); }
    }catch(e){ /* شروحات الأخطاء المخصصة اختيارية */ }
    ALLQ = [];
    for(const ex in DATA.exams) DATA.exams[ex].forEach(q=>ALLQ.push({...q,ex}));
    $("#fab").style.display="flex";
    initTracking();
    ttsInit();
    authPing();
    if("serviceWorker" in navigator && location.hostname==="teoriaai.com"){
      navigator.serviceWorker.register("/sw.js").catch(()=>{});
    }
    applyLangDir();
    if(isEN()) await loadEnOverlay();
    if(!CFG.FIREBASE) TP.log('visit');
    if(!LANG){ landing(); langPicker(); }
    else landing();
  }catch(e){
    root.innerHTML=`<div class="center-screen"><div style="font-size:42px">⚠️</div>
    <div style="font-weight:800;font-size:18px">${A("تعذّر تحميل الأسئلة","Could not load the questions")}</div>
    <div style="color:var(--muted)">${A("تأكد من اتصالك بالإنترنت وأعد المحاولة.","Check your internet connection and try again.")}</div>
    <button class="btn" style="max-width:200px;margin:10px auto" onclick="location.reload()">${A("إعادة المحاولة","Retry")}</button></div>`;
  }
}

const TTS={

function ttsInit(){

  const pick=()=>{

    // صوت عربي + صوت إنجليزي
    TTS.voiceAr = vs.find(v=>/^ar/i.test(v.lang) && /Google/i.test(v.name))
             || vs.find(v=>/^ar/i.test(v.lang) && /Microsoft|Hoda|Naayf|Hamed|Salma|Laila|Majed|Mariam/i.test(v.name))
             || vs.find(v=>/^ar/i.test(v.lang)) || null;
    TTS.voiceEn = vs.find(v=>/^en/i.test(v.lang) && /Google/i.test(v.name))
             || vs.find(v=>/^en/i.test(v.lang)) || null;
    TTS.voice = TTS.voiceAr;

// نظّف النص قبل النطق: حوّل رموز الإشارات لأسمائها، شيل الإيموجي والرموز
function ttsClean(t){
  t=(t||"").replace(/\[\[(\w+)\]\]/g,(m,c)=>DATA&&DATA.signals[c]?A("الشاخصة "+DATA.signals[c].code_ar,"sign "+tcode(c)):"");
  t=t.replace(/كم\s*\/\s*ساعة/g," كيلومتر بالساعة ").replace(/كغم(?![\u0600-\u06FF])/g," كيلوغرام ").replace(/(\d+)\s*م(?![\u0600-\u06FF])/g,"$1 متر").replace(/km\/h/gi," kilometers per hour ").replace(/(\d+)\s*m\b/g,"$1 meters").replace(/(\d+)\s*kg\b/gi,"$1 kilograms");
  t=t.replace(/<[^>]*>/g," ");                       // HTML tags
  t=t.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}✓✗×✅❌💡📖🔊•—«»]/gu," ");
  return t.replace(/\s+/g," ").trim();
}
// قراءة مقسّمة جُمل-جُمل (بعض المتصفحات بتقطع النص الطويل)
let TTS_QUEUE=[];
function speak(text){
  if(!TTS.on || !("speechSynthesis" in window)) return;
  const t=ttsClean(text);
  if(!t) return;
  // اختار الصوت المناسب للغة الحالية
  const need = isEN()? TTS.voiceEn : TTS.voiceAr;
  if(!need){
    const vs=speechSynthesis.getVoices();
    if(isEN()) TTS.voiceEn = vs.find(v=>/^en/i.test(v.lang))||null;
    else TTS.voiceAr = vs.find(v=>/^ar/i.test(v.lang))||null;
    if(!(isEN()?TTS.voiceEn:TTS.voiceAr)){ alert(A("جهازك ما فيه صوت عربي مثبّت 😕\nعلى الكمبيوتر: أضف اللغة العربية مع خاصية النطق من إعدادات النظام.\nعلى الموبايل غالباً بيشتغل مباشرة.","No matching voice is installed on your device 😕\nOn desktop: add the language with speech in your system settings.\nOn mobile it usually works out of the box.")); return; }
  }
  TTS.voice = isEN()? TTS.voiceEn : TTS.voiceAr;
  speechSynthesis.cancel();
  // قسّم لجمل قصيرة
  let parts = t.split(/(?<=[.؟!،:])\s+|(?<=\.)\s+/).filter(s=>s.trim().length>0);
  if(!parts.length) parts=[t];
  // أي جملة أطول من ~160 حرف قسّمها على الكلمات (كروم بيقطع الطويل)
  TTS_QUEUE=[];
  parts.forEach(p=>{
    if(p.length<=160){ TTS_QUEUE.push(p); return; }
    const ws=p.split(" "); let cur="";
    ws.forEach(w=>{ if((cur+" "+w).length>160){ TTS_QUEUE.push(cur.trim()); cur=w; } else cur+=" "+w; });
    if(cur.trim()) TTS_QUEUE.push(cur.trim());
  });
  TTS.speaking=true;
  ttsNext();
}
function ttsNext(){
  if(!TTS.speaking || !TTS_QUEUE.length){
    TTS.speaking=false;
    const b=$("#ttsQBtn"); if(b)b.classList.remove("playing");
    return;
  }
  const part=TTS_QUEUE.shift();
  const u=new SpeechSynthesisUtterance(part);
  u.lang = TTS.voice ? TTS.voice.lang : (isEN()?"en-US":"ar-SA");
  if(TTS.voice) u.voice=TTS.voice;
  u.rate=0.95;
  u.onend=()=>ttsNext();
  u.onerror=()=>ttsNext();
  speechSynthesis.speak(u);
}

  const ready = isEN() ? (DATA.explanations_en && DATA.explanations_en[qKey(q)])

// تسجيل نتيجة امتحان بالتقدّم
function recordExam(qs, ans){
  const p=getProg();
  qs.forEach((q,i)=>{
    if(ans[i]==null) return;
    const ok=ans[i]===LET[+q.answer-1], tp=topicOf(q), k=qKey(q);
    p.answered++; if(ok)p.correct++;
    p.byTopic[tp]=p.byTopic[tp]||{seen:0,correct:0};
    p.byTopic[tp].seen++; if(ok)p.byTopic[tp].correct++;
    const mi=p.mistakes.findIndex(m=>qKey(m)===k);
    if(ok){ if(mi>=0)p.mistakes.splice(mi,1); }
    else if(mi<0){ p.mistakes.push({id:q.id,ex:q.ex,question:q.question,a:q.a,b:q.b,c:q.c,d:q.d,answer:q.answer}); }
  });
  const correct=qs.filter((q,i)=>ans[i]===LET[+q.answer-1]).length;
  p.points += correct*2;
  p.history.push({t:Date.now(),correct,total:qs.length});
  if(p.history.length>50)p.history=p.history.slice(-50);
  // نجاح؟ (بمقياس نسبة النجاح الرسمية)
  const passed = correct >= Math.round(CFG.PASS_MARK/CFG.EXAM_LEN*qs.length);
  if(passed && (STATE.mode==='exam'||STATE.mode==='random')){ p.passes=(p.passes||0)+1; p.points+=15; }
  const newBadges=checkBadges(p);
  saveProg(p);
  return {passed, newBadges};
}

/* ================= FX: صوت + اهتزاز + تشجيع ================= */
const FX=(()=>{
  let ctx=null;
  const on=()=>localStorage.getItem("tp_sfx")!=="0";
  const ac=()=>{ if(!on()) return null; try{ ctx=ctx||new (window.AudioContext||window.webkitAudioContext)(); if(ctx.state==="suspended")ctx.resume(); return ctx; }catch(e){ return null; } };
  function tone(f,dur,type,vol,delay){
    const c=ac(); if(!c) return;
    const t0=c.currentTime+(delay||0);
    const o=c.createOscillator(), g=c.createGain();
    o.type=type||"sine"; o.frequency.setValueAtTime(f,t0);
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(vol||.12,t0+.012);
    g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
    o.connect(g); g.connect(c.destination); o.start(t0); o.stop(t0+dur+.02);
  }
  const vib=p=>{ try{ if(localStorage.getItem("tp_hap")!=="0" && navigator.vibrate) navigator.vibrate(p); }catch(e){} };
  return {
    tap(){ tone(520,.05,"sine",.05); vib(8); },
    ok(){ tone(660,.1,"sine",.1); tone(880,.14,"sine",.09,.07); tone(1320,.2,"sine",.05,.14); vib([12,40,18]); },
    no(){ tone(200,.16,"square",.06); tone(150,.22,"square",.05,.1); vib([26,60,26]); },
    win(){ [523,659,784,1047].forEach((f,i)=>tone(f,.34,"triangle",.1,i*.11)); vib([18,50,18,50,40]); },
    lose(){ [392,349,294].forEach((f,i)=>tone(f,.3,"sine",.07,i*.14)); vib(60); },
    level(){ [784,988,1319].forEach((f,i)=>tone(f,.4,"triangle",.09,i*.09)); vib([12,30,12,30,12]); },
    toggle(){ const v=on()?"0":"1"; localStorage.setItem("tp_sfx",v); if(v==="1")this.ok(); return v==="1"; },
    isOn:on
  };
})();

function confetti(n){
  const c=document.createElement("canvas"); c.id="confetti"; document.body.appendChild(c);
  const x=c.getContext("2d"), W=c.width=innerWidth, H=c.height=innerHeight;
  const cols=["#3B82F6","#F5B62F","#22C55E","#EF4444","#A855F7","#fff"];
  const P=Array.from({length:n||90},()=>({x:Math.random()*W,y:-20-Math.random()*H*.4,
    r:4+Math.random()*6,c:cols[Math.floor(Math.random()*cols.length)],
    vy:2+Math.random()*3.4,vx:-1.4+Math.random()*2.8,rot:Math.random()*6,vr:-.16+Math.random()*.32}));
  let f=0;
  (function loop(){
    x.clearRect(0,0,W,H); f++;
    P.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=.045;
      x.save(); x.translate(p.x,p.y); x.rotate(p.rot); x.fillStyle=p.c;
      x.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6); x.restore(); });
    if(f<260) requestAnimationFrame(loop); else c.remove();
  })();
}

function buildSmartExam(){
  const p=getProg();
  const byKey={}; ALLQ.forEach(q=>byKey[qKey(q)]=q);
  const out=[], used=new Set();
  const add=q=>{ const k=qKey(q); if(!q||used.has(k))return; used.add(k); out.push({...q}); };
  // 1) من أخطائه المحفوظة (لغاية 10)
  shuffle((p.mistakes||[]).slice()).slice(0,10).forEach(m=>add(byKey[qKey(m)]||m));
  // 2) من أضعف موضوعين (حسب دقته)
  const weak=Object.entries(p.byTopic||{})
    .filter(([k,v])=>TOPICS[k]&&v.seen>=4)
    .sort((a,b)=>(a[1].correct/a[1].seen)-(b[1].correct/b[1].seen))
    .slice(0,2).map(([k])=>k);
  weak.forEach((tk,wi)=>{
    shuffle(ALLQ.filter(q=>topicOf(q)===tk)).slice(0, wi===0?10:6).forEach(add);
  });
  // 3) تكملة عشوائية للـ30
  shuffle(ALLQ.slice()).forEach(q=>{ if(out.length<30) add(q); });
  return shuffle(out).slice(0,30);
}

  let ready = lastAvg!=null ? Math.round(lastAvg/CFG.EXAM_LEN*100*.7 + acc*.3) : acc;

    : ready>=70? {t:A("قريب جداً — شد حالك شوي 📈","Very close — one more push 📈"),c:"#c98600",m:A("أساسك قوي بس في ثغرات. ركّز على المواضيع الضعيفة تحت، وحل امتحانين كمان قبل ما تقدّم.","Your base is strong but there are gaps. Focus on the weak topics below and take two more mock exams before booking.")}
    : {t:A("لسا بدري — لا تستعجل ⏳","Not yet — don\'t rush ⏳"),c:"#d63b3b",m:A("لو قدّمت هلأ في احتمال كبير ترسب وتخسر رسوم الامتحان. ادرس المواضيع الضعيفة، حل امتحانات أكثر، وارجع افحص حالك.","If you book now, you\'re likely to fail and lose the exam fee. Study the weak topics, take more mock exams, then check again.")};

    <div class="ready-card">
      <div class="result-ring" style="margin-top:0">
        <svg width="150" height="150"><circle cx="75" cy="75" r="64" fill="none" stroke="var(--line)" stroke-width="12"/>
        <circle cx="75" cy="75" r="64" fill="none" stroke="${verdict.c}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${2*Math.PI*64}" stroke-dashoffset="${2*Math.PI*64*(1-ready/100)}"/></svg>
        <div class="pct"><b>${ready}%</b><span>${A("جاهزية","Ready")}</span></div>
      </div>
      <div class="rd-verdict" style="color:${verdict.c}">${verdict.t}</div>
      <div class="rd-msg">${verdict.m}</div>

    <div class="num-grp">

      ${lastAvg!=null?`<div class="ng-row"><div class="ng-v">${lastAvg}/${CFG.EXAM_LEN}</div><div class="ng-d">${A(`معدل آخر ${last3.length} ${last3.length===1?"امتحان":"امتحانات"} (النجاح ${CFG.PASS_MARK})`,`Average of last ${last3.length} exam${last3.length===1?"":"s"} (pass mark ${CFG.PASS_MARK})`)}</div></div>`:""}
      ${passRate!=null?`<div class="ng-row"><div class="ng-v">${passRate}%</div><div class="ng-d">${A(`نسبة نجاحك بالامتحانات (${exams.length} امتحان)`,`Pass rate across your mock exams (${exams.length})`)}</div></div>`:""}

      ${topics.map(t=>`<div class="ng-row"><div class="ng-v" style="color:${t.pct<60?"#d63b3b":t.pct<80?"#c98600":"#1f8a55"}">${t.pct}%</div><div class="ng-d">${TNAMES[t.k]||t.k} (${t.seen} ${A("سؤال","Qs")})</div></div>`).join("")}

    out.innerHTML=`<div style="font-weight:800;margin-bottom:8px">${res.length} ${A("نتيجة","results")}</div>`+res.map(x=>qResHtml(x.item)).join("");
    TP.log('search_q');
  },250);

/* ================= الامتحان ================= */
let timerInt=null;
function startExam(mode,examNum){
  let qs;
  if(mode==='exam'){ qs = DATA.exams[examNum].map(q=>({...q,ex:String(examNum)})); }
  else if(mode==='smart'){ qs = buildSmartExam(); }
  else if(mode==='mistakes'){
    qs = getProg().mistakes.slice();
    if(!qs.length) return emptyState(A("ما عندك أخطاء محفوظة 🎉","No saved mistakes 🎉"),A("حِل امتحانات أول، والأسئلة اللي بتغلط فيها بتنحفظ هون للمراجعة.","Take some exams first — questions you get wrong are saved here for review."));
    qs=shuffle(qs);
  }
  else if(mode==='flagged'){
    qs = getProg().flagged.slice();
    if(!qs.length) return emptyState(A("ما في أسئلة معلّمة ⭐","No flagged questions ⭐"),A("علّم أي سؤال صعب بزر العلم أثناء الحل، وبيجيك هون تراجعه.","Flag any hard question while practicing, and review it here."));
    qs=shuffle(qs);
  }
  else if(mode==='daily'){ qs = shuffle(ALLQ).slice(0,10); }
  else { qs = shuffle(ALLQ).slice(0,CFG.EXAM_LEN); }
  STATE = {mode, examNum, qs, idx:0, ans:new Array(qs.length).fill(null),
           endAt: (mode==='random')?Date.now()+CFG.EXAM_MINUTES*60000:null};
  TP.log('start_exam',{mode, exam:examNum||mode, total:qs.length});
  root.innerHTML = chrome(mode==='daily'?'daily':null);
  renderQ();
  if(STATE.endAt) startTimer();
}
function emptyState(title,sub){
  root.innerHTML=chrome(null);
  setView(`<div class="screen"><div style="text-align:center;padding:40px 20px">
    <div style="font-size:52px">🗂️</div>
    <div style="font-weight:900;font-size:20px;margin-top:8px">${title}</div>
    <div style="color:var(--muted);margin-top:6px">${sub}</div>
    <button class="btn" style="max-width:220px;margin:18px auto 0" onclick="gate('exam')">${A("ابدأ امتحان","Start an exam")}</button>
  </div></div>`);
}
function startTimer(){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    const el=$("#timer"); if(!el){clearInterval(timerInt);return;}
    let left=Math.max(0,Math.round((STATE.endAt-Date.now())/1000));
    const m=String(Math.floor(left/60)).padStart(2,'0'), s=String(left%60).padStart(2,'0');
    el.textContent="⏱ "+m+":"+s;
    el.classList.toggle('warn',left<=60);
    if(left<=0){clearInterval(timerInt);finishExam();}
  },500);
}

        <svg viewBox="0 0 24 24" fill="none"><path d="M5 21V4h11l-1.5 4L16 12H5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="flagTxt">${isFlagged(qKey(q))?T('flagged_q'):T('flag_q')}</span>
      </button>
      <span class="q-num">${STATE.mode==='exam'?T('exam_n')+' '+STATE.examNum+' — ':STATE.mode==='mistakes'?A('مراجعة أخطاء','Mistakes review')+' — ':STATE.mode==='flagged'?A('أسئلة معلّمة','Flagged')+' — ':STATE.mode==='daily'?A('تمرين سريع','Quick practice')+' — ':''}${T('question_n')} ${idx+1}</span>
      <button class="tts-btn" id="ttsQBtn" onclick="speakCur()" title="${T('listen')}">🔊</button>

function finishExam(){
  clearInterval(timerInt);
  const {qs,ans}=STATE;
  let correct=0;
  qs.forEach((q,i)=>{ if(ans[i]===LET[+q.answer-1]) correct++; });
  STATE.correct=correct;
  const rec=recordExam(qs, ans);
  STATE.newBadges=rec.newBadges;
  if(STATE.mode==='daily'){
    const p=getProg();
    if(p.lastDaily!==today()){
      p.streak = (p.lastDaily===yesterday())? (p.streak+1) : 1;
      p.lastDaily=today(); p.points+=10;
      checkBadges(p); saveProg(p);
    }
    STATE.streak=getProg().streak;
  }
  TP.log('finish_exam',{correct,total:qs.length,mode:STATE.mode});
  try{
    const pct=Math.round(correct/qs.length*100), pass=correct>=Math.round(CFG.PASS_MARK/CFG.EXAM_LEN*qs.length);
    if(pass){ FX.win(); confetti(110); setTimeout(()=>cheer(A("نجحت! 🎉 "+pct+"%","Passed! 🎉 "+pct+"%"),"good"),250); }
    else { FX.lose(); setTimeout(()=>cheer(A("قريب — راجع أخطاءك وارجع 💪","Close — review your mistakes 💪"),"bad"),250); }
  }catch(e){}
  try{ const a=AUTH.get(); if(a&&a.token){
    fetch(CFG.AUTH_API+"/api/progress",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({phone:a.phone,token:a.token,correct,total:qs.length,mode:STATE.mode})}).catch(()=>{});
  }}catch(e){}
  try{
    if(STATE.mode==='exam' && qs[0] && qs[0].ex) planMark('ex'+qs[0].ex);
    if(STATE.mode==='random') planMark('mock');
  }catch(e){}
  renderResult();
}

function progress(){
  TP.log('open_progress');
  const p=getProg(), a=AUTH.get();
  root.innerHTML=chrome("progress");
  // ---- جاهزية (نفس معادلة الرئيسية) ----
  const acc = p.answered>0 ? p.correct/p.answered : 0;
  const cover = Math.min(1, p.answered/300);
  const exN = Object.keys(p.exams||{}).length;
  const ready = Math.round((acc*0.55 + cover*0.25 + Math.min(1,exN/6)*0.20)*100);
  const dash=283, roff=Math.round(dash-(dash*ready/100));
  // ---- تاريخ الامتحان ----
  const exd=p.examDate||null;
  let cd="";
  if(exd){ const days=Math.ceil((new Date(exd)-Date.now())/864e5);
    cd = days<0?A("امتحانك عدّى 🍀","Your exam passed 🍀")
       : days===0?A("امتحانك اليوم! 🍀","Exam today! 🍀")
       : A("باقي ","")+days+A(" يوم"," days left"); }
  // ---- رسم تطور العلامات (آخر 12 امتحان) ----
  const hist=(p.history||[]).slice(-12);
  const passLine=Math.round(CFG.PASS_MARK/CFG.EXAM_LEN*100);
  let chart="";
  if(hist.length>=2){
    const W=300,H=110,PAD=8;
    const xs=hist.map((_,k)=>PAD+k*(W-2*PAD)/(hist.length-1));
    const ys=hist.map(x=>{const pc=x.correct/x.total*100; return H-PAD-(H-2*PAD)*pc/100;});
    const pts=xs.map((x,k)=>x+","+ys[k]).join(" ");
    const yPass=H-PAD-(H-2*PAD)*passLine/100;
    const dots=xs.map((x,k)=>{const pc=Math.round(hist[k].correct/hist[k].total*100);
      return `<circle cx="${x}" cy="${ys[k]}" r="4" fill="${pc>=passLine?'var(--ok)':'var(--danger)'}"/>`;}).join("");
    const lastPc=Math.round(hist[hist.length-1].correct/hist[hist.length-1].total*100);
    const prevPc=Math.round(hist[hist.length-2].correct/hist[hist.length-2].total*100);
    const diff=lastPc-prevPc;
    chart=`<div class="box2">
      <div class="b2h">${A("تطوّر علاماتك","Your score trend")}
        <span style="color:${diff>=0?'var(--ok)':'var(--danger)'};font-size:12.5px">${diff>=0?"▲ +":"▼ "}${diff}% ${A("عن السابق","vs last")}</span></div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
        <line x1="${PAD}" y1="${yPass}" x2="${W-PAD}" y2="${yPass}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 4" opacity=".6"/>
        <text x="${W-PAD}" y="${yPass-4}" font-size="8.5" fill="var(--accent)" text-anchor="end">${A("خط النجاح","pass")} ${passLine}%</text>
        <polyline points="${pts}" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        ${dots}

const BEG_TEXT_INTRO=[ // شاخصات عامة — بأول القسم
  "المسافة بين شاخصة تحذير",
  "شاخصة على شكل مثلث"
];
const BEG_TEXT_TL=[ // الإشارة الضوئية — تُعرض مع قسم هـ
  "الضوء الاحمر في الاشارة الضوئية",
  "تقف قبل الاشارة الضوئية وتريد الاستدارة",
  "دخلت المفترق بضوء اخضر",
  "هل يجب العمل دائما بموجب الضوء الاخضر",
  "ضوء اخضر متقطع في الاشارة الضوئية"
];
const BEG_STOP_Q="عندما توجد الاشارة"; // سؤال «قف» → يُربط بـ ب-37

let BEGST={seq:[],i:0,label:""};

// يبني تسلسل التعلّم لنوع إشارات واحد (letter: a..f)
function buildBegType(letter){
  const byCode={}, extraQ=[]; let stopQ=null;
  Object.entries(DATA.exams).forEach(([ex,qs])=>{
    qs.forEach(q=>{
      const qq={...q,ex:String(ex)};
      const all=(q.question||"")+" "+(q.a||"")+" "+(q.b||"")+" "+(q.c||"")+" "+(q.d||"");
      const codes=[...new Set([...all.matchAll(/\[\[(\w+)\]\]/g)].map(m=>m[1]))];
      if(codes.length){ codes.forEach(c=>{ (byCode[c]=byCode[c]||[]).push(qq); }); }
      else{
        const t=q.question||"";
        if(letter==="a" && BEG_TEXT_INTRO.some(s=>t.includes(s))) extraQ.push({q,tag:"🔺 سؤال عام عن شاخصات التحذير"});
        else if(letter==="e" && BEG_TEXT_TL.some(s=>t.includes(s))) extraQ.push({q,tag:"🚦 سؤال الإشارة الضوئية"});
        else if(letter==="b" && t.includes(BEG_STOP_Q)&&t.includes("قف")) stopQ=qq;
      }
    });
  });
  if(stopQ) (byCode["b37"]=byCode["b37"]||[]).push(stopQ);
  // إشارات هذا النوع فقط
  const codes=Object.keys(DATA.signals).filter(c=>c[0]===letter)
    .sort((x,y)=>(parseInt(x.replace(/\D/g,''))||0)-(parseInt(y.replace(/\D/g,''))||0));
  const seq=[];
  extraQ.forEach(e=>seq.push({t:"tq",q:e.q,tag:e.tag}));
  const noQ=[];
  codes.forEach(c=>{
    const qs=byCode[c];
    if(qs&&qs.length){
      seq.push({t:"sig",c,n:qs.length});
      qs.forEach((q,i)=>seq.push({t:"sq",c,q,i:i+1,n:qs.length}));
    }else noQ.push(c);
  });
  if(noQ.length) seq.push({t:"mem",codes:noQ});
  return seq;
}

function begAnswer(i,j){
  const q=BEGST.seq[i].q, corIdx=+q.answer-1, ok=j===corIdx;
  const b=getBeg(), k=qKey(q); const first=b.answered[k]==null;
  b.answered[k]=j; saveBeg(b);
  if(!first && ok){ const p=getProg(); p.points+=2; checkBadges(p); saveProg(p); } // الإعادة بتشجع بالنقاط
  if(first){
    const p=getProg(), tp=topicOf(q);
    p.answered++; if(ok){p.correct++; p.points+=2;}
    p.byTopic[tp]=p.byTopic[tp]||{seen:0,correct:0}; p.byTopic[tp].seen++; if(ok)p.byTopic[tp].correct++;
    if(!ok && !p.mistakes.some(m=>qKey(m)===k)) p.mistakes.push({id:q.id,ex:q.ex,question:q.question,a:q.a,b:q.b,c:q.c,d:q.d,answer:q.answer});
    checkBadges(p); saveProg(p);
  }
  TP.log('beg_answer',{ok});
  if(ok){ FX.ok(); cheer(rnd(isEN()?CHEERS_OK_EN:CHEERS_OK),"good"); }
  else { FX.no(); cheer(rnd(isEN()?CHEERS_NO_EN:CHEERS_NO),"bad"); }
  begReveal(i,j);
}
function begReveal(i,j){
  const q=BEGST.seq[i].q, corIdx=+q.answer-1;
  LET.forEach((L,x)=>{ const el=$("#bo"+x); if(!el)return; el.disabled=true;
    if(x===corIdx)el.classList.add("correct"); else if(x===j)el.classList.add("wrong"); });
  const fx=$("#begFx");
  if(fx) fx.innerHTML=(j===corIdx?`<div class="motivate" style="margin-top:12px">${T("correct_fb")}</div>`:`<div class="motivate" style="margin-top:12px;color:var(--danger)">${T("wrong_fb")}</div>`)+explainQ2(q,j)+askTeacherBtn(q);
  const nx=$("#begNext"); if(nx) nx.innerHTML=`<button class="btn" onclick="begRun(${i+1})">${T("next")}</button>`;
}

function pracAnswer(j){
  const i=PRAC.i, q=PRAC.qs[i], corIdx=+q.answer-1, ok=j===corIdx;
  if(PRAC.ans[i]==null){
    PRAC.ans[i]=j; if(ok)PRAC.cor++;

    const p=getProg(), tp=topicOf(q), k=qKey(q);
    p.answered++; if(ok){p.correct++;p.points+=2;}
    p.byTopic[tp]=p.byTopic[tp]||{seen:0,correct:0}; p.byTopic[tp].seen++; if(ok)p.byTopic[tp].correct++;
    if(!ok && !p.mistakes.some(m=>qKey(m)===k)) p.mistakes.push({id:q.id,ex:q.ex,question:q.question,a:q.a,b:q.b,c:q.c,d:q.d,answer:q.answer});

// المساعد الذكي الحقيقي (يمر عبر Worker يخفي المفتاح)
async function askAI(query){
  if(isEN()) query = "[Answer in English only] " + query;
  // جهّز السياق محلياً (RAG): الكتاب + الإشارات + الأسئلة الأقرب
  const q=normAr(query);
  const toks=[...new Set(q.split(" ").filter(t=>t.length>1))];
  const dc=parseCode(query);
  const sig = dc&&DATA.signals[dc] ? [{code:dc}] : searchSignals(toks,3);
  const book = searchBook(toks,3);
  const qs = searchQuestions(toks,3);
  let ctx="";
  if(sig.length) ctx+="إشارات:\n"+sig.map(x=>`${DATA.signals[x.code].code_ar}: ${DATA.signals[x.code].text}`).join("\n")+"\n\n";
  if(book.length) ctx+="من كتاب التوريا:\n"+book.map(b=>fixBook(b.text)).join("\n---\n")+"\n\n";
  if(qs.length) ctx+="أسئلة رسمية (مع الإجابة الصحيحة):\n"+qs.map(x=>{const it=x.item,cor=LET[+it.answer-1];return `${stripCodes(it.question)} الإجابة: ${stripCodes(it[cor])}`;}).join("\n");
  // سياق تقدم الطالب — يخلي المساعد يرد بشكل شخصي
  try{
    const pp=getProg();
    if(pp.answered>=10){
      const tp=Object.entries(pp.byTopic||{}).filter(([k,v])=>TOPICS[k]&&v.seen>=4)
        .map(([k,v])=>TOPICS[k].name+" "+Math.round(v.correct/v.seen*100)+"%").join("، ");
      ctx+="\n\nمعلومات عن الطالب (استعملها إذا سأل عن حاله أو نصيحة): حل "+pp.answered+" سؤال بدقة "+
        Math.round(pp.correct/pp.answered*100)+"%، أخطاؤه المحفوظة "+(pp.mistakes||[]).length+
        (tp?"، مستواه بالمواضيع: "+tp:"")+".";
    }
  }catch(e){}

  const box=$("#cmsgs");
  const typing=document.createElement("div");
  typing.className="msg bot"; typing.innerHTML=`<span style="opacity:.6">${A("يفكّر…","Thinking…")}</span>`;
  box.appendChild(typing); box.scrollTop=box.scrollHeight;
  try{
    const r=await fetch(CFG.AI_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({question:(isEN()?"Answer in English only. ":"")+query, context:ctx, lang:LANG||"ar"})});
    const data=await r.json();
    typing.remove();
    const ans=(data.answer||"").trim();
    if(!ans) return botReply(query); // احتياط: بحث محلي
    let html=esc(ans).replace(/\n/g,"<br>");
    // أرفق صور الإشارات المرتبطة إذا وُجدت
    if(sig.length) html+=sig.slice(0,2).map(x=>sigResHtml(x.code)).join("");
    botSay(html);
    TP.log('ai_answer');
  }catch(e){
    typing.remove();
    botSay(A("تعذّر الاتصال بالمساعد الذكي حالياً — بجاوبك من الأسئلة الرسمية:","The AI assistant is unavailable right now — answering from the official questions:"));
    botReply(query);
  }
}

function botReply(query){
  const raw=(query||"").trim();
  const q=normAr(raw);
  const toks=[...new Set(q.split(" ").filter(t=>t.length>1))];

  // ردود جاهزة
  if(/^(مرحب|هلا|السلام|اهلا|هاي|صباح|مسا|هلو)/.test(q) && q.length<25)
    return botSay(A(`هلا وغلا 👋 اسألني عن أي إشارة أو موضوع بالتوريا، وبجاوبك من <b>الكتاب</b> والأسئلة الرسمية.`,`Hey! 👋 Ask me about any sign or theory topic and I will answer from the <b>book</b> and official questions.`));
  if(/(كيف|ازاي).*(انجح|بنجح|ادرس|بدرس)|نصيح|كيف احفظ|طريقه.*دراس/.test(q))
    return botSay(A(`نصيحتي عشان تنجح 💪<br>• حِل كل امتحان من الـ${DATA.meta.total_exams} امتحانات وراجع أخطاءك.<br>• احفظ الإشارات من قسم المبتدئين 🌱.<br>• قبل الامتحان راجع «الأرقام المهمة» و«أخطائي».`,`My advice to pass 💪<br>• Take all ${DATA.meta.total_exams} exams and review your mistakes.<br>• Memorize the signs in the Beginners Section 🌱.<br>• Before the exam, review Key Numbers and My Mistakes.`));

  // رمز إشارة مباشر (ب-28 / a14)
  const dc=parseCode(raw);
  if(dc && DATA.signals[dc]) return botSay(`${A("إشارة","Sign")} <b>${esc(tcode(dc))}</b>:`+sigResHtml(dc));

  if(!toks.length) return botSay(A(`اكتب سؤالك بكلمات أوضح شوي 🙏`,`Please phrase your question a bit more clearly 🙏`));

  // بحث بعتبة ثقة
  const need = Math.min(3, Math.max(1, Math.ceil(toks.length/2)));
  const rel = x => x && x.hit>=need && x.sc>=3;

  const sig  = searchSignals(toks,3).filter(rel);
  const book = isEN()?[]:searchBook(toks,1).filter(rel); // الكتاب عربي فقط
  const qs   = searchQuestions(toks,3).filter(rel);

  const wantsQ = /سؤال|اسئل|امتحان|تمرين/.test(q);

  if(!sig.length && !book.length && !qs.length){
    return botSay(A(`ما لقيت إجابة مضبوطة 🤔 جرّب:<br>• رمز الإشارة مثل <b>ب-28</b><br>• أو موضوع أوضح مثل «الأولوية»، «التجاوز»، «الأضواء».`,`I could not find an exact answer 🤔 Try:<br>• A sign code like <b>B-28</b><br>• Or a clearer topic like right-of-way, overtaking, or lights.`));
  }

  let html="";
  if(sig.length && !wantsQ)
    html += (sig.length>1?A(`الإشارات المرتبطة:`,`Related signs:`):A(`الإشارة:`,`The sign:`)) + sig.map(x=>sigResHtml(x.code)).join("");
  if(book.length)
    html += `<div style="background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:13.5px;line-height:1.7"><b style="color:var(--primary)">📖 من كتاب التوريا:</b><br>${esc(fixBook(book[0].text))}</div>`;
  if(qs.length && (wantsQ || (!sig.length))){
    html += `<div style="margin-top:8px;font-weight:700">${A("أسئلة رسمية عن الموضوع:","Official questions on this topic:")}</div>` + qs.map(x=>qResHtml(x.item)).join("");
  }
  botSay(html);
}

function parseCode(s){
  s=(s||"").trim();
  let m=s.match(/(?:^|\s)([أبجدهو])\s*[-ـ]\s*(\d+)\s*([أاب])?/);
  if(m){const map={"أ":"a","ب":"b","ج":"c","د":"d","ه":"e","و":"f"};
    let c=map[m[1]]+m[2]; if(m[3])c+=(m[3]==="ب"?"b":"a"); return c;}
  m=s.match(/^([a-f])\s*-?\s*(\d+)([ab])?$/i);
  if(m){let c=m[1].toLowerCase()+m[2]; if(m[3])c+=m[3].toLowerCase(); return c;}
  return null;
}
function scoreText(text, toks){
  const t=normAr(text); let sc=0, hit=0;
  toks.forEach(tk=>{ if(t.includes(tk)){ hit++; sc+=Math.min(tk.length,5); } });
  return {sc, hit};
}
function searchSignals(toks,n){
  return Object.entries(DATA.signals).map(([code,s])=>{
    const base=isEN()?(tsig(code)+" "+tcode(code)+" "+code):(s.text+" "+s.code_ar);
    const {sc,hit}=scoreText(base, toks); return {code,sc,hit};
  }).filter(x=>x.hit>0).sort((a,b)=>b.sc-a.sc).slice(0,n);
}
function searchQuestions(toks,n){
  return ALLQ.map(item=>{
    const base=isEN()?[tq(item,"q"),tq(item,"a"),tq(item,"b"),tq(item,"c"),tq(item,"d")].join(" ")
                     :(item.question+" "+item.a+" "+item.b+" "+item.c+" "+item.d);
    const {sc,hit}=scoreText(base, toks); return {item,sc,hit};
  }).filter(x=>x.hit>0).sort((a,b)=>b.sc-a.sc).slice(0,n);
}
function searchBook(toks,n){
  if(!DATA.book) return [];
  return DATA.book.map(b=>{ const {sc,hit}=scoreText(b.text, toks); return {text:b.text,sc,hit}; })
    .filter(x=>x.hit>0).sort((a,b)=>b.sc-a.sc).slice(0,n);
}
function sigResHtml(code){
  const s=DATA.signals[code];
  const img=s.no_image?`<div style="width:56px;height:56px;display:grid;place-items:center;background:#fff;border-radius:8px;border:1px solid var(--line);font-weight:800;flex:none">${esc(tcode(code))}</div>`
    :`<img src="${IMG_BASE}${code}.jpg" onerror="this.style.display='none'">`;
  return `<div class="res-sig">${img}<div class="rc"><b>${esc(tcode(code))}</b><br>${esc(tsig(code))}</div></div>`;
}
function qResHtml(item){
  const cor=LET[+item.answer-1];
  return `<div class="res-q"><div class="qq">${renderSig(tq(item,"q"))}</div>
    <div class="aa">✅ ${renderSig(tq(item,cor), isImgOnly(item[cor]))}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:3px">${T("exam_n")} ${item.ex}</div></div>`;
}

boot();
</script>
