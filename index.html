<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>توريا فلسطين — المدرب محمد سواد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============ إعدادات عامة ============ */
:root{
  --bg:#f6f2f3; --surface:#ffffff; --surface-2:#faf6f7;
  --ink:#241016; --muted:#8a6b73; --line:#efe2e5;
  --primary:#8e1e3c; --primary-d:#6d1530; --primary-l:#fbeef1;
  --accent:#c99a2e; --danger:#c0392b; --danger-l:#fbeceb;
  --ok:#2f8f5b; --ok-l:#eaf6ef;
  --shadow:0 12px 40px rgba(110,21,48,.12); --shadow-s:0 4px 16px rgba(110,21,48,.07);
  --r:20px; --r-s:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Tajawal',system-ui,sans-serif;
  background:radial-gradient(1200px 600px at 50% -120px,#fbeef1 0%,var(--bg) 55%);
  background-attachment:fixed;
  color:var(--ink);
  line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#cbd5cf;border-radius:8px}

/* ============ الهيكل ============ */
.app{max-width:560px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:90px}
.topbar{
  position:sticky;top:0;z-index:40;
  background:rgba(255,255,255,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  color:var(--ink);border-bottom:1px solid var(--line);
  padding:12px 16px;display:flex;align-items:center;gap:10px;
}
.topbar .logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary-d));display:grid;place-items:center;flex:none;box-shadow:0 4px 14px rgba(142,30,60,.35)}
.topbar .logo svg{width:24px;height:24px}
.topbar h1{font-size:18px;font-weight:800;margin:0;line-height:1.2}
.topbar .sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px}
.topbar .home-btn{margin-inline-start:auto;background:var(--primary-l);color:var(--primary);border:1px solid var(--line);border-radius:11px;padding:7px 12px;font-size:13px;font-weight:800;display:none;align-items:center;gap:5px}
.topbar .home-btn.show{display:flex}

.screen{padding:16px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ============ الرئيسية ============ */
.hero{background:linear-gradient(135deg,#a12447,#8e1e3c 55%,#6d1530);border-radius:var(--r);padding:24px 20px;color:#fff;box-shadow:0 14px 40px rgba(142,30,60,.3);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;left:-40px;bottom:-40px;width:150px;height:150px;background:rgba(255,255,255,.1);border-radius:50%}
.hero::before{content:"";position:absolute;right:-20px;top:-30px;width:90px;height:90px;background:rgba(201,154,46,.25);border-radius:50%}
.hero h2{margin:0 0 6px;font-size:23px;font-weight:900;position:relative}
.hero p{margin:0;opacity:.9;font-size:14px;font-weight:600;position:relative}
.hero .instructor{margin-top:14px;display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.16);padding:8px 13px;border-radius:12px;width:fit-content;position:relative;font-weight:700}
.hero .instructor b{font-weight:900}
.stats{display:flex;gap:10px;margin:14px 0 4px}
.stat{flex:1;background:var(--surface);border-radius:var(--r-s);padding:12px 8px;text-align:center;box-shadow:var(--shadow-s)}
.stat .n{font-size:22px;font-weight:900;color:var(--primary)}
.stat .l{font-size:12px;color:var(--muted);font-weight:500}

.menu{display:grid;gap:12px;margin-top:16px}
.card{background:var(--surface);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-s);border:1px solid var(--line);text-align:right;transition:transform .12s,border-color .12s}
.card:active{transform:scale(.985)}
.card:hover{border-color:var(--primary)}
.card .ic{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;flex:none}
.card .ic svg{width:28px;height:28px}
.card .tx{flex:1}
.card .tx h3{margin:0;font-size:17px;font-weight:800}
.card .tx p{margin:2px 0 0;font-size:13px;color:var(--muted)}
.card .arrow{color:var(--muted);font-size:20px}
.ic.g{background:var(--primary-l);color:var(--primary)}
.ic.a{background:#f9f0da;color:#a97e12}
.ic.b{background:#eaf0f8;color:#365f9c}
.ic.p{background:#f1ebf7;color:#6b3fa0}

/* ============ أزرار ============ */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:800;background:var(--primary);color:#fff;box-shadow:0 4px 14px rgba(142,30,60,.28);transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--surface);color:var(--primary);border:1.5px solid var(--primary);box-shadow:none}
.btn.ghost{background:var(--surface-2);color:var(--ink);box-shadow:none;border:1px solid var(--line)}
.btn.sm{padding:11px;font-size:14px;border-radius:12px}
.btn:disabled{opacity:.45;pointer-events:none}

/* ============ اختيار الامتحان ============ */
.sec-title{font-size:19px;font-weight:900;margin:4px 0 12px;display:flex;align-items:center;gap:8px}
.mode-cards{display:grid;gap:12px;margin-bottom:8px}
.exam-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px}
.exam-chip{aspect-ratio:1;background:var(--surface);border:1.5px solid var(--line);border-radius:14px;display:grid;place-items:center;font-size:20px;font-weight:800;color:var(--primary);box-shadow:var(--shadow-s);transition:transform .1s}
.exam-chip:active{transform:scale(.95);background:var(--primary-l)}

/* ============ الامتحان ============ */
.quiz-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.progress-wrap{flex:1}
.progress-bar{height:8px;background:var(--line);border-radius:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#16a86a);border-radius:8px;transition:width .3s;width:0}
.q-count{font-size:13px;font-weight:700;color:var(--muted);margin-top:5px;text-align:center}
.timer{background:var(--ink);color:#fff;padding:8px 12px;border-radius:11px;font-weight:800;font-size:15px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:6px;flex:none}
.timer.warn{background:var(--danger);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.6}}

.q-card{background:var(--surface);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.q-card .wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;transform:rotate(-24deg);opacity:.05;font-size:26px;font-weight:900;white-space:nowrap;color:var(--primary)}
.q-num{display:inline-block;background:var(--primary-l);color:var(--primary);font-weight:800;font-size:13px;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.q-text{font-size:18px;font-weight:700;line-height:1.7;position:relative;z-index:1}
.q-text img,.opt img{display:inline-block;vertical-align:middle;height:46px;margin:2px 4px;border-radius:6px;border:1px solid var(--line);background:#fff}
.sig-chip{display:inline-block;background:var(--surface-2);border:1px dashed var(--muted);border-radius:8px;padding:1px 8px;font-weight:800;font-size:14px;margin:0 3px;color:var(--primary)}
.opts{display:grid;gap:10px;margin-top:16px;position:relative;z-index:1}
.opt{display:flex;align-items:center;gap:12px;background:var(--surface-2);border:2px solid var(--line);border-radius:14px;padding:13px 14px;text-align:right;font-size:15.5px;font-weight:600;transition:all .12s;width:100%;color:var(--ink)}
.opt .lbl{width:30px;height:30px;border-radius:9px;background:#fff;border:1.5px solid var(--line);display:grid;place-items:center;font-weight:800;flex:none;font-size:15px}
.opt .otx{flex:1}
.opt .otx img{height:64px}
.opt.sel{border-color:var(--primary);background:var(--primary-l)}
.opt.sel .lbl{background:var(--primary);color:#fff;border-color:var(--primary)}
.opt.correct{border-color:var(--ok);background:var(--ok-l)}
.opt.correct .lbl{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt.wrong{border-color:var(--danger);background:var(--danger-l)}
.opt.wrong .lbl{background:var(--danger);color:#fff;border-color:var(--danger)}
.opt .mark{margin-inline-start:auto;font-weight:800;font-size:18px}

.quiz-nav{display:flex;gap:10px;margin-top:16px}
.quiz-nav .btn{flex:1}

/* ============ النتيجة ============ */
.result-card{background:var(--surface);border-radius:var(--r);padding:26px 20px;text-align:center;box-shadow:var(--shadow)}
.result-ring{width:150px;height:150px;margin:0 auto 14px;position:relative}
.result-ring svg{transform:rotate(-90deg)}
.result-ring .pct{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.result-ring .pct b{font-size:38px;font-weight:900;line-height:1}
.result-ring .pct span{font-size:13px;color:var(--muted)}
.result-badge{display:inline-flex;align-items:center;gap:8px;font-size:20px;font-weight:900;padding:9px 20px;border-radius:14px;margin-bottom:6px}
.result-badge.pass{background:var(--ok-l);color:var(--ok)}
.result-badge.fail{background:var(--danger-l);color:var(--danger)}
.result-sub{color:var(--muted);font-size:15px;margin-bottom:18px}
.result-sub b{color:var(--ink)}

/* ============ الإشارات ============ */
.tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:6px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:8px 14px;border-radius:20px;background:var(--surface);border:1.5px solid var(--line);font-weight:700;font-size:14px;white-space:nowrap}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:11px 14px;margin-bottom:12px}
.search-box input{flex:1;border:none;outline:none;font-family:inherit;font-size:15px;background:none;color:var(--ink)}
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sig{background:var(--surface);border-radius:var(--r-s);overflow:hidden;box-shadow:var(--shadow-s);border:1px solid var(--line)}
.sig .imgw{aspect-ratio:1.15;background:#fff;display:grid;place-items:center;padding:10px;position:relative}
.sig .imgw img{max-width:100%;max-height:100%;object-fit:contain}
.sig .noimg{color:var(--muted);font-weight:800;font-size:22px}
.sig .code{position:absolute;top:6px;inset-inline-start:6px;background:var(--primary);color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:8px}
.sig .txt{padding:9px 11px;font-size:12.5px;font-weight:600;line-height:1.45;border-top:1px solid var(--line)}

/* ============ الشات بوت ============ */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 150px);min-height:420px}
.chat-msgs{flex:1;overflow-y:auto;padding:4px 2px 10px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:88%;padding:11px 14px;border-radius:16px;font-size:15px;line-height:1.6;box-shadow:var(--shadow-s);animation:fade .2s}
.msg.bot{background:var(--surface);border:1px solid var(--line);border-top-right-radius:5px;align-self:flex-start}
.msg.me{background:var(--primary);color:#fff;border-top-left-radius:5px;align-self:flex-end}
.msg .res-sig{display:flex;gap:10px;align-items:center;background:var(--surface-2);border-radius:10px;padding:8px;margin-top:8px}
.msg .res-sig img{width:56px;height:56px;object-fit:contain;background:#fff;border-radius:8px;border:1px solid var(--line);flex:none;padding:3px}
.msg .res-sig .rc{font-size:12px}
.msg .res-sig .rc b{color:var(--primary)}
.msg .res-q{background:var(--surface-2);border-radius:10px;padding:10px;margin-top:8px;font-size:13.5px}
.msg .res-q .qq{font-weight:700}
.msg .res-q .aa{color:var(--ok);font-weight:700;margin-top:4px;display:flex;gap:5px}
.msg .res-q img{height:38px;display:inline-block;vertical-align:middle;margin:0 3px;border-radius:5px;border:1px solid var(--line)}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.chip{background:var(--surface);border:1.5px solid var(--line);border-radius:18px;padding:7px 12px;font-size:13px;font-weight:700;color:var(--primary)}
.chat-input{display:flex;gap:8px;align-items:center;background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:6px 6px 6px 14px}
.chat-input input{flex:1;border:none;outline:none;font-family:inherit;font-size:15px;background:none}
.chat-input .send{width:42px;height:42px;border-radius:12px;background:var(--primary);color:#fff;display:grid;place-items:center;flex:none}
.chat-input .send svg{width:20px;height:20px}

/* ============ الأزرار العائمة (سناب/واتساب) ============ */
.fab{position:fixed;bottom:18px;inset-inline-start:14px;z-index:50;display:flex;flex-direction:column;gap:10px}
.fab a{width:50px;height:50px;border-radius:50%;display:grid;place-items:center;box-shadow:0 4px 14px rgba(0,0,0,.22);text-decoration:none;transition:transform .12s}
.fab a:active{transform:scale(.9)}
.fab .wa{background:#25d366}
.fab .sn{background:#fffc00;position:relative}
.fab a svg{width:28px;height:28px}
.fab .sn small{position:absolute;bottom:-16px;inset-inline-start:50%;transform:translateX(50%);font-size:9px;font-weight:800;color:#8a7a00;white-space:nowrap;background:#fffc00;padding:1px 5px;border-radius:6px}

/* ============ شاشة عامة (تحميل/إغلاق) ============ */
.center-screen{min-height:100vh;display:grid;place-content:center;text-align:center;padding:30px;gap:12px}
.spinner{width:44px;height:44px;border:4px solid var(--line);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.brand-footer{text-align:center;font-size:12px;color:var(--muted);padding:20px 16px 8px}
.brand-footer b{color:var(--primary)}
.hidden{display:none!important}

/* ============ نافذة كلمة السر ============ */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(36,16,22,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .2s}
.modal{background:var(--surface);border-radius:22px;padding:26px 22px;max-width:360px;width:100%;text-align:center;box-shadow:0 24px 60px rgba(36,16,22,.4);animation:pop .25s}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:none;opacity:1}}
.modal .lock{width:64px;height:64px;margin:0 auto 14px;border-radius:18px;background:var(--primary-l);display:grid;place-items:center;color:var(--primary)}
.modal .lock svg{width:34px;height:34px}
.modal h3{margin:0 0 5px;font-size:20px;font-weight:900}
.modal p{margin:0 0 16px;color:var(--muted);font-size:14px}
.modal .pin{width:100%;text-align:center;font-size:26px;font-weight:800;letter-spacing:8px;padding:13px;border:2px solid var(--line);border-radius:14px;outline:none;font-family:inherit;background:var(--surface-2);color:var(--ink);margin-bottom:6px}
.modal .pin:focus{border-color:var(--primary)}
.modal .err{color:var(--danger);font-size:13px;font-weight:700;min-height:18px;margin-bottom:8px}
.modal .m-wa{display:block;margin-top:12px;color:var(--muted);font-size:12.5px;text-decoration:none}
.modal .m-wa b{color:#128c7e}

/* ============ صفحة الدخول (Landing) ============ */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 24px;position:relative;overflow:hidden}
.landing::before{content:"";position:absolute;top:-120px;inset-inline-start:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(142,30,60,.16),transparent 70%);filter:blur(10px)}
.landing::after{content:"";position:absolute;bottom:-140px;inset-inline-end:-90px;width:300px;height:300px;background:radial-gradient(circle,rgba(201,154,46,.14),transparent 70%);filter:blur(10px)}
.landing-inner{position:relative;z-index:1;max-width:400px;width:100%;animation:fade .5s ease}
.landing .badge{display:inline-flex;align-items:center;gap:7px;background:var(--primary-l);border:1px solid var(--line);color:var(--primary);font-weight:800;font-size:12.5px;padding:6px 14px;border-radius:20px;margin-bottom:26px}
.landing .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 0 rgba(142,30,60,.6);animation:blip 1.6s infinite}
@keyframes blip{0%{box-shadow:0 0 0 0 rgba(142,30,60,.5)}70%{box-shadow:0 0 0 9px rgba(142,30,60,0)}100%{box-shadow:0 0 0 0 rgba(142,30,60,0)}}
.landing .l-logo{width:92px;height:92px;margin:0 auto 22px;border-radius:26px;background:linear-gradient(135deg,var(--primary),var(--primary-d));display:grid;place-items:center;box-shadow:0 16px 44px rgba(142,30,60,.4)}
.landing .l-logo svg{width:52px;height:52px}
.landing h1{font-size:30px;font-weight:900;margin:0 0 6px;line-height:1.25}
.landing h1 .ai{background:linear-gradient(90deg,#8e1e3c,#c99a2e);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.landing .tagline{color:var(--muted);font-size:16px;font-weight:600;margin:0 0 22px;line-height:1.6}
.landing .demo-pill{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 16px;font-size:13.5px;color:var(--muted);font-weight:600;margin-bottom:22px;line-height:1.7;box-shadow:var(--shadow-s)}
.landing .demo-pill b{color:var(--primary);font-weight:900}
.landing .enter-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:17px;border-radius:16px;font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;box-shadow:0 10px 30px rgba(142,30,60,.35);transition:transform .1s}
.landing .enter-btn:active{transform:scale(.97)}
.landing .wa-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:15px;border-radius:16px;font-size:16px;font-weight:800;background:#25d366;color:#fff;text-decoration:none;margin-top:12px;box-shadow:0 8px 24px rgba(37,211,102,.28)}
.landing .l-foot{margin-top:26px;color:var(--muted);font-size:13px;font-weight:600}
.landing .l-foot b{color:var(--ink)}
.landing .feats{display:flex;gap:8px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.landing .feat{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--muted)}

/* ============ شريط النسخة التجريبية ============ */
.demo-bar{background:var(--primary-l);color:var(--primary);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12.5px;font-weight:700;justify-content:center;flex-wrap:wrap;line-height:1.4;text-align:center}
.demo-bar .tag{background:var(--primary);color:#fff;font-weight:900;padding:2px 9px;border-radius:20px;font-size:11px;flex:none}
.demo-bar span{color:var(--muted)}
.demo-bar a{background:#25d366;color:#fff;text-decoration:none;padding:4px 12px;border-radius:20px;font-weight:900;font-size:12px;display:inline-flex;align-items:center;gap:5px;flex:none}
.demo-note{background:var(--primary-l);border:1px dashed var(--primary);border-radius:14px;padding:13px 14px;margin-top:16px;font-size:13.5px;color:var(--ink);text-align:center;font-weight:600}
.demo-note b{font-weight:900;color:var(--primary)}
.demo-note a{color:#128c7e;font-weight:900;text-decoration:none}
</style>
</head>
<body>

<div id="root" class="app">
  <div class="center-screen" id="boot">
    <div class="spinner"></div>
    <div style="font-weight:700;color:var(--muted)">جاري تحميل توريا فلسطين…</div>
  </div>
</div>

<!-- الأزرار العائمة -->

function normAr(s){return (s||"").replace(/[\u064B-\u065F\u0670]/g,"").replace(/[إأآا]/g,"ا").replace(/ى/g,"ي").replace(/ة/g,"ه").replace(/[ؤئ]/g,"و").replace(/[^\u0600-\u06FF0-9a-zA-Z ]/g," ").replace(/ا{2,}/g,"ا").replace(/\s+/g," ").trim().toLowerCase();}
function fixBook(t){return (t||"").replace(/اإ/g,"الإ").replace(/اأ/g,"الأ").replace(/اإل/g,"الإل").replace(/\s+/g," ").trim();}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// يحوّل [[code]] داخل النص إلى صورة الإشارة (أو رمز نصّي إذا ما في صورة)
function renderSig(text, big){
  const h = big?64:46;
  return esc(text).replace(/\[\[(\w+)\]\]/g,(m,code)=>{
    const s = DATA.signals[code];
    if(!s) return `<span class="sig-chip">${code}</span>`;
    if(s.no_image) return `<span class="sig-chip" title="${esc(s.text)}">${esc(s.code_ar)}</span>`;
    return `<img src="${IMG_BASE}${code}.jpg" alt="${esc(s.code_ar)}" title="${esc(s.text)}" style="height:${h}px" loading="lazy" onerror="this.outerHTML='<span class=\\'sig-chip\\'>${esc(s.code_ar||code)}</span>'">`;
  });
}
// هل الخيار عبارة عن صورة إشارة فقط؟
function isImgOnly(t){return normAr(t.replace(/\[\[\w+\]\]/g,"")).length===0 && /\[\[\w+\]\]/.test(t);}

};

  }catch(e){/* الملف غير موجود = مفتوح */}

  // 2) تحميل الداتا
  try{
    const r = await fetch(DATA_URL);
    DATA = await r.json();
    ALLQ = [];
    for(const ex in DATA.exams) DATA.exams[ex].forEach(q=>ALLQ.push({...q,ex}));
    $("#fab").style.display="flex";
    initTracking();
    if(!CFG.FIREBASE) TP.log('visit');

    root.innerHTML=`<div class="center-screen"><div style="font-size:42px">⚠️</div>

  }
}

  m.innerHTML=`<div class="modal">

  document.body.appendChild(m);
  const inp=$("#pinInput"); inp.focus();
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter")checkPin(action); });
  m.addEventListener("click",e=>{ if(e.target===m)closePin(); });
  TP.log('pin_prompt',{action});
}
function checkPin(action){
  const v=$("#pinInput").value.trim();
  if(v===String(CFG.ACCESS_PASS)){
    UNLOCKED=true; TP.log('pin_ok'); closePin(); ACTIONS[action]();
  }else{
    $("#pinErr").textContent="كلمة السر غير صحيحة";
    const inp=$("#pinInput"); inp.value=""; inp.focus();
    inp.style.borderColor="var(--danger)"; setTimeout(()=>inp.style.borderColor="",600);
    TP.log('pin_fail');
  }
}

function chooseExam(){
  root.innerHTML = chrome(true);
  const chips = Object.keys(DATA.exams).map(n=>`<button class="exam-chip" onclick="startExam('exam',${n})">${n}</button>`).join("");
  setView(`<div class="screen">

  </div>`);

/* ================= الامتحان ================= */
let timerInt=null;
function startExam(mode,examNum){
  let qs;
  if(mode==='exam'){ qs = DATA.exams[examNum].map(q=>({...q,ex:String(examNum)})); }
  else { qs = shuffle(ALLQ).slice(0,CFG.EXAM_LEN); }
  STATE = {mode, examNum, qs, idx:0, ans:new Array(qs.length).fill(null),
           endAt: mode==='exam'?null:Date.now()+CFG.EXAM_MINUTES*60000};
  TP.log('start_exam',{mode, exam:examNum||'random', total:qs.length});
  root.innerHTML = chrome(true);
  renderQ();
  if(STATE.endAt) startTimer();
}
function startTimer(){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    const el=$("#timer"); if(!el){clearInterval(timerInt);return;}
    let left=Math.max(0,Math.round((STATE.endAt-Date.now())/1000));
    const m=String(Math.floor(left/60)).padStart(2,'0'), s=String(left%60).padStart(2,'0');
    el.textContent="⏱ "+m+":"+s;
    el.classList.toggle('warn',left<=60);
    if(left<=0){clearInterval(timerInt);finishExam();}
  },500);
}
function renderQ(){
  const {qs,idx,ans}=STATE, q=qs[idx];
  const total=qs.length, answered=ans.filter(a=>a!==null).length;
  const opts = LET.map((L,i)=>{
    const raw=q[L], img=isImgOnly(raw);
    const sel = ans[idx]===L?'sel':'';
    return `<button class="opt ${sel}" id="opt-${L}" onclick="pick('${L}')">
      <span class="lbl">${LET_AR[i]}</span>
      <span class="otx">${renderSig(raw,img)}</span>
    </button>`;
  }).join("");
  setView(`<div class="screen">
    <div class="quiz-head">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${(idx+1)/total*100}%"></div></div>
        <div class="q-count">سؤال ${idx+1} من ${total} · تمّت الإجابة على ${answered}</div>
      </div>
      ${STATE.endAt?`<div class="timer" id="timer">⏱ --:--</div>`:''}
    </div>
    <div class="q-card">
      <div class="wm">${CFG.INSTRUCTOR} · ${CFG.SNAP}</div>
      <span class="q-num">${STATE.mode==='exam'?'امتحان '+STATE.examNum+' — ':''}السؤال ${idx+1}</span>
      <div class="q-text">${renderSig(q.question)}</div>
      <div class="opts">${opts}</div>
    </div>
    <div class="quiz-nav">
      ${idx>0?`<button class="btn ghost" onclick="navQ(-1)">السابق ›</button>`:''}
      ${idx<total-1
        ?`<button class="btn" onclick="navQ(1)">‹ التالي</button>`
        :`<button class="btn" style="background:var(--accent);color:#3a2c00" onclick="confirmFinish()">✓ إنهاء وتصحيح</button>`}
    </div>
    <div style="text-align:center;margin-top:12px">
      <button class="btn sm ghost" style="width:auto;display:inline-flex;padding:8px 16px" onclick="confirmFinish()">إنهاء الامتحان الآن</button>
    </div>
  </div>`);
  if(STATE.endAt) startTimer();
}
function pick(L){ STATE.ans[STATE.idx]=L;
  LET.forEach(x=>$("#opt-"+x).classList.toggle('sel',x===L));
  $(".q-count").textContent=`سؤال ${STATE.idx+1} من ${STATE.qs.length} · تمّت الإجابة على ${STATE.ans.filter(a=>a!==null).length}`;
}
function navQ(d){ STATE.idx+=d; renderQ(); }
function confirmFinish(){
  const un=STATE.ans.filter(a=>a===null).length;
  if(un>0 && !confirm(`باقي ${un} سؤال بدون إجابة. متأكد بدك تنهي؟`)) return;
  finishExam();
}
function finishExam(){
  clearInterval(timerInt);
  const {qs,ans}=STATE;
  let correct=0;
  qs.forEach((q,i)=>{ if(ans[i]===LET[+q.answer-1]) correct++; });
  STATE.correct=correct;
  TP.log('finish_exam',{correct,total:qs.length,mode:STATE.mode});
  renderResult();
}
function renderResult(){
  const {qs,correct}=STATE, total=qs.length;
  const pct=Math.round(correct/total*100);
  const pass = correct>=CFG.PASS_MARK || (STATE.mode!=='exam'&&pct>=Math.round(CFG.PASS_MARK/CFG.EXAM_LEN*100));
  const need = STATE.mode==='exam'||total===CFG.EXAM_LEN;
  const R=64,C=2*Math.PI*R, off=C*(1-pct/100);
  root.innerHTML=chrome(true);
  setView(`<div class="screen">
    <div class="result-card">
      <div class="result-badge ${pass?'pass':'fail'}">${pass?'🎉 ناجح':'💪 حاول مرة ثانية'}</div>
      <div class="result-ring">
        <svg width="150" height="150"><circle cx="75" cy="75" r="${R}" fill="none" stroke="var(--line)" stroke-width="12"/>
        <circle cx="75" cy="75" r="${R}" fill="none" stroke="${pass?'var(--ok)':'var(--danger)'}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"/></svg>
        <div class="pct"><b>${correct}<span style="font-size:20px">/${total}</span></b><span>${pct}%</span></div>
      </div>
      <div class="result-sub">أجبت صح على <b>${correct}</b> من <b>${total}</b>${need?` · النجاح يحتاج <b>${CFG.PASS_MARK}</b> فأكثر`:''}</div>
      <button class="btn" onclick="reviewExam()">📝 مراجعة الأخطاء والإجابات</button>
      <div style="height:10px"></div>
      <button class="btn sec" onclick="${STATE.mode==='exam'?`startExam('exam',${STATE.examNum})`:`startExam('random')`}">🔄 إعادة</button>
      <div style="height:10px"></div>
      <button class="btn ghost" onclick="home()">الرئيسية</button>
    </div>
    <div class="brand-footer">💡 للحجز مع <b>${CFG.INSTRUCTOR}</b> · واتساب ${CFG.WHATSAPP}</div>
  </div>`);
}
function reviewExam(){
  const {qs,ans}=STATE;
  root.innerHTML=chrome(true);
  const items=qs.map((q,i)=>{
    const cor=LET[+q.answer-1], mine=ans[i];
    const opts=LET.map((L,j)=>{
      let cls=''; if(L===cor)cls='correct'; else if(L===mine&&mine!==cor)cls='wrong';
      const img=isImgOnly(q[L]);
      const mark = L===cor?'<span class="mark">✓</span>':(L===mine&&mine!==cor?'<span class="mark">✕</span>':'');
      return `<div class="opt ${cls}"><span class="lbl">${LET_AR[j]}</span><span class="otx">${renderSig(q[L],img)}</span>${mark}</div>`;
    }).join("");
    return `<div class="q-card" style="margin-bottom:14px">
      <span class="q-num" style="${mine===cor?'background:var(--ok-l);color:var(--ok)':(mine===null?'background:#eee;color:#888':'background:var(--danger-l);color:var(--danger)')}">
        ${i+1} · ${mine===cor?'صحيح':(mine===null?'بدون إجابة':'خطأ')}</span>
      <div class="q-text" style="font-size:16px">${renderSig(q.question)}</div>
      <div class="opts">${opts}</div>
    </div>`;
  }).join("");
  setView(`<div class="screen">
    <div class="sec-title">📝 المراجعة</div>
    ${items}
    <button class="btn ghost" onclick="renderResult()">‹ رجوع للنتيجة</button>
    <div style="height:10px"></div>
    <button class="btn" onclick="home()">الرئيسية</button>
  </div>`);
}

/* ================= مكتبة الإشارات ================= */
let sigFilter='a', sigSearch='';
function signals(){
  sigFilter='a'; sigSearch='';
  TP.log('open_signals');
  root.innerHTML=chrome(true);
  const tabs = Object.keys(CAT).map(k=>`<button class="tab ${k==='a'?'active':''}" data-cat="${k}" onclick="filterSig('${k}')">${CAT[k].name}</button>`).join("");
  setView(`<div class="screen">
    <div class="sec-title">🚸 مكتبة الإشارات</div>
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#5e6f66" stroke-width="2"/><path d="M21 21l-4-4" stroke="#5e6f66" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="sigq" placeholder="ابحث عن إشارة… (مثلاً: قف، تجاوز، ب-28)" oninput="searchSig(this.value)">
    </div>
    <div class="tabs" id="sigtabs">${tabs}</div>
    <div class="sig-grid" id="siggrid"></div>
  </div>`);
  drawSignals();
}
function filterSig(k){ sigFilter=k; sigSearch=''; const q=$("#sigq"); if(q)q.value='';
  document.querySelectorAll('#sigtabs .tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===k));
  drawSignals();
}
function searchSig(v){ sigSearch=v; drawSignals(); }
function drawSignals(){
  const q=normAr(sigSearch);
  let list=Object.entries(DATA.signals);
  if(q){
    list=list.filter(([code,s])=> normAr(s.text).includes(q) || normAr(s.code_ar).includes(q) || code.includes(q.replace(/\s/g,'')));
  }else{
    list=list.filter(([code])=>code[0]===sigFilter);
  }
  list.sort((a,b)=>(parseInt(a[0].replace(/\D/g,''))||0)-(parseInt(b[0].replace(/\D/g,''))||0));
  const grid=$("#siggrid");
  if(!list.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:30px">ما في نتائج 🤷‍♂️</div>`;return;}
  grid.innerHTML=list.map(([code,s])=>`
    <div class="sig">
      <div class="imgw">
        <span class="code">${esc(s.code_ar)}</span>
        ${s.no_image?`<span class="noimg">${esc(s.code_ar)}</span>`
          :`<img src="${IMG_BASE}${code}.jpg" loading="lazy" alt="${esc(s.code_ar)}" onerror="this.parentElement.innerHTML='<span class=\\'code\\'>${esc(s.code_ar)}</span><span class=\\'noimg\\'>🚸</span>'">`}
      </div>
      <div class="txt">${esc(s.text)}</div>
    </div>`).join("");
}

/* ================= المساعد الذكي (بحث بالداتا — مجاني) ================= */
let chatHist=[];
function chat(){
  TP.log('open_chat');
  root.innerHTML=chrome(true);
  setView(`<div class="screen">
    <div class="chat-wrap">
      <div class="chat-msgs" id="cmsgs"></div>
      <div class="chips" id="cchips">
        <button class="chip" onclick="quickChat('شو معنى إشارة قف')">شو معنى إشارة قف؟</button>
        <button class="chip" onclick="quickChat('شو أقسام إشارات المرور')">أقسام الإشارات</button>
        <button class="chip" onclick="quickChat('ب-28')">ب-28</button>
        <button class="chip" onclick="quickChat('أسئلة عن التجاوز')">أسئلة عن التجاوز</button>
      </div>
      <div class="chat-input">
        <input id="cin" placeholder="اكتب سؤالك…" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="send" onclick="sendChat()"><svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="#fff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg></button>
      </div>
    </div>
  </div>`);
  chatHist=[];
  botSay(`أهلاً! 👋 أنا مساعد <b>توريا فلسطين</b>.<br>اسألني عن أي إشارة، أو موضوع بالتوريا، وبجاوبك من <b>كتاب التوريا</b> والأسئلة الرسمية.`);
}
function quickChat(t){ $("#cin").value=t; sendChat(); }
function addMsg(html,who){
  const box=$("#cmsgs"); const d=document.createElement("div");
  d.className="msg "+who; d.innerHTML=html; box.appendChild(d); box.scrollTop=box.scrollHeight;
}
function botSay(html){ addMsg(html,'bot'); }
function sendChat(){
  const inp=$("#cin"); const t=inp.value.trim(); if(!t)return;
  addMsg(esc(t),'me'); inp.value='';
  const chips=$("#cchips"); if(chips)chips.style.display='none';
  TP.log('chat',{q:t.slice(0,120)});
  setTimeout(()=>botReply(t),200);
}

function botReply(query){
  const raw=(query||"").trim();
  const q=normAr(raw);
  const toks=[...new Set(q.split(" ").filter(t=>t.length>1))];

  // ردود جاهزة
  if(/^(مرحب|هلا|السلام|اهلا|هاي|صباح|مسا|هلو)/.test(q) && q.length<25)
    return botSay(`هلا وغلا 👋 اسألني عن أي إشارة أو موضوع بالتوريا، وبجاوبك من <b>الكتاب</b> والأسئلة الرسمية.`);
  if(/(كيف|ازاي).*(انجح|بنجح|ادرس|بدرس)|نصيح|كيف احفظ|طريقه.*دراس/.test(q))
    return botSay(`نصيحتي عشان تنجح 💪<br>• حِل كل امتحان من الـ${DATA.meta.total_exams} امتحانات وراجع أخطاءك.<br>• احفظ الإشارات من <b>مكتبة الإشارات</b>.<br>• كرّر <b>الامتحان الرسمي</b> لحد ما تعدّي ${CFG.PASS_MARK}/${CFG.EXAM_LEN} بثبات.<br>وأي إشارة مش فاهمها اسألني عنها 👌`);

  // رمز إشارة مباشر (ب-28 / a14)
  const dc=parseCode(raw);
  if(dc && DATA.signals[dc]) return botSay(`إشارة <b>${esc(DATA.signals[dc].code_ar)}</b>:`+sigResHtml(dc));

  if(!toks.length) return botSay(`اكتب سؤالك بكلمات أوضح شوي 🙏`);

  // بحث بعتبة ثقة
  const need = Math.min(3, Math.max(1, Math.ceil(toks.length/2)));
  const rel = x => x && x.hit>=need && x.sc>=3;

  const sig  = searchSignals(toks,3).filter(rel);
  const book = searchBook(toks,1).filter(rel);
  const qs   = searchQuestions(toks,3).filter(rel);

  const wantsQ = /سؤال|اسئل|امتحان|تمرين/.test(q);

  if(!sig.length && !book.length && !qs.length){
    return botSay(`ما لقيت إجابة مضبوطة 🤔 جرّب:<br>• رمز الإشارة مثل <b>ب-28</b><br>• أو موضوع أوضح مثل «الأولوية»، «التجاوز»، «سكة الحديد»، «خط متواصل».`);
  }

  let html="";
  if(sig.length && !wantsQ)
    html += (sig.length>1?`الإشارات المرتبطة:`:`الإشارة:`) + sig.map(x=>sigResHtml(x.code)).join("");
  if(book.length)
    html += `<div style="background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:13.5px;line-height:1.7"><b style="color:var(--primary)">📖 من كتاب التوريا:</b><br>${esc(fixBook(book[0].text))}</div>`;
  if(qs.length && (wantsQ || (!sig.length))){
    html += `<div style="margin-top:8px;font-weight:700">أسئلة رسمية عن الموضوع:</div>` + qs.map(x=>qResHtml(x.item)).join("");
  }
  botSay(html);
}

function parseCode(s){
  s=(s||"").trim();
  let m=s.match(/(?:^|\s)([أبجدهو])\s*[-ـ]\s*(\d+)\s*([أاب])?/);
  if(m){const map={"أ":"a","ب":"b","ج":"c","د":"d","ه":"e","و":"f"};
    let c=map[m[1]]+m[2]; if(m[3])c+=(m[3]==="ب"?"b":"a"); return c;}
  m=s.match(/^([a-f])\s*-?\s*(\d+)([ab])?$/i);
  if(m){let c=m[1].toLowerCase()+m[2]; if(m[3])c+=m[3].toLowerCase(); return c;}
  return null;
}
function scoreText(text, toks){
  const t=normAr(text); let sc=0, hit=0;
  toks.forEach(tk=>{ if(t.includes(tk)){ hit++; sc+=Math.min(tk.length,5); } });
  return {sc, hit};
}
function searchSignals(toks,n){
  return Object.entries(DATA.signals).map(([code,s])=>{
    const {sc,hit}=scoreText(s.text+" "+s.code_ar, toks); return {code,sc,hit};
  }).filter(x=>x.hit>0).sort((a,b)=>b.sc-a.sc).slice(0,n);
}
function searchQuestions(toks,n){
  return ALLQ.map(item=>{
    const {sc,hit}=scoreText(item.question+" "+item.a+" "+item.b+" "+item.c+" "+item.d, toks); return {item,sc,hit};
  }).filter(x=>x.hit>0).sort((a,b)=>b.sc-a.sc).slice(0,n);
}
function searchBook(toks,n){
  if(!DATA.book) return [];
  return DATA.book.map(b=>{ const {sc,hit}=scoreText(b.text, toks); return {text:b.text,sc,hit}; })
    .filter(x=>x.hit>0).sort((a,b)=>b.sc-a.sc).slice(0,n);
}
function sigResHtml(code){
  const s=DATA.signals[code];
  const img=s.no_image?`<div style="width:56px;height:56px;display:grid;place-items:center;background:#fff;border-radius:8px;border:1px solid var(--line);font-weight:800;flex:none">${esc(s.code_ar)}</div>`
    :`<img src="${IMG_BASE}${code}.jpg" onerror="this.style.display='none'">`;
  return `<div class="res-sig">${img}<div class="rc"><b>${esc(s.code_ar)}</b><br>${esc(s.text)}</div></div>`;
}
function qResHtml(item){
  const cor=LET[+item.answer-1];
  return `<div class="res-q"><div class="qq">${renderSig(item.question)}</div>
    <div class="aa">✅ ${renderSig(item[cor], isImgOnly(item[cor]))}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:3px">امتحان ${item.ex}</div></div>`;
}

/* ================= بدء ================= */
boot();
</script>
